<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QDS ULTIMATE - النظام الأسطوري</title>
    
    <meta name="description" content="أقوى نظام لتحليل ودمج الوحوش في لعبة الفاتحون">
    <meta name="author" content="Al FaTeh">
    
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='10' y='80' font-size='80' fill='%2300f2ff'%3E⚡%3C/text%3E%3C/svg%3E">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        :root {
            --primary: #00f2ff;
            --primary-dark: #0088cc;
            --secondary: #ffd700;
            --danger: #ff4444;
            --success: #00ff88;
            --legend: #aa88ff;
            
            --bg-dark: #0a0a0f;
            --bg-panel: #111116;
            --bg-card: #1a1a24;
            
            --text: #ffffff;
            --text-dim: #aaaac0;
            --border: #2a2a35;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        /* الهيدر */
        .header {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .brand {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 30px var(--primary);
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
        }

        .brand::after {
            content: 'نهائي';
            font-size: 0.9rem;
            background: var(--secondary);
            color: black;
            padding: 4px 12px;
            border-radius: 30px;
            position: absolute;
            top: 0;
            left: -30px;
            font-weight: bold;
        }

        .credit {
            display: flex;
            justify-content: center;
            gap: 20px;
            color: var(--text-dim);
            flex-wrap: wrap;
        }

        /* شاشة الحالة */
        .status-container {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .status {
            font-size: 4rem;
            text-align: center;
            padding: 20px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 20px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .status.warning {
            border-color: var(--secondary);
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }

        .status.danger {
            border-color: var(--danger);
            box-shadow: 0 0 30px rgba(255,68,68,0.3);
        }

        .status.legend {
            border-color: var(--legend);
            box-shadow: 0 0 50px rgba(170,136,255,0.5);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-value.max {
            color: var(--secondary);
        }

        /* اللوحة */
        .game-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .tile {
            aspect-ratio: 1;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 15px;
            transition: 0.3s;
        }

        .tile input {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 1.8rem;
            text-align: center;
            font-weight: bold;
            outline: none;
        }

        /* ألوان الأرقام */
        .tile input[value="1"] { color: #88ccff; }
        .tile input[value="2"] { color: #88ff88; }
        .tile input[value="3"] { color: #ffff88; }
        .tile input[value="4"] { color: #ffaa88; }
        .tile input[value="5"] { color: #ff8888; }
        .tile input[value="6"] { color: #ff88ff; }
        .tile input[value="7"] { color: #ddaaff; }
        .tile input[value="8"] { color: #aaccff; text-shadow: 0 0 10px blue; }
        .tile input[value="9"] { color: #ffaa00; text-shadow: 0 0 10px orange; }
        .tile input[value="10"] { color: #ff5500; text-shadow: 0 0 20px red; }
        .tile input[value="11"] { color: #ff00ff; text-shadow: 0 0 20px magenta; }
        .tile input[value="12"] { color: #ffdd00; text-shadow: 0 0 20px gold; }
        .tile input[value="13"] { color: #ffaa88; text-shadow: 0 0 20px #ff5500; font-size: 2rem; }
        .tile input[value="14"] { color: #ff8888; text-shadow: 0 0 30px red; font-size: 2rem; }
        .tile input[value="15"] { color: white; text-shadow: 0 0 40px white; font-size: 2.2rem; }

        /* الأزرار */
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #00a2ff, #00f2ff);
            border: none;
            padding: 20px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            color: black;
            cursor: pointer;
            box-shadow: 0 5px 0 #0088cc;
            transition: 0.1s;
            margin-bottom: 15px;
        }

        .btn-primary:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        .btn-primary.legend {
            background: linear-gradient(135deg, #aa88ff, #cc88ff);
            box-shadow: 0 5px 0 #8866cc;
        }

        .direction-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn-dir {
            background: var(--bg-card);
            border: 2px solid var(--border);
            padding: 15px;
            border-radius: 30px;
            font-size: 2rem;
            color: var(--primary);
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-dir:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .btn-reset {
            width: 100%;
            background: var(--bg-card);
            border: 2px solid var(--danger);
            padding: 15px;
            border-radius: 30px;
            font-size: 1.3rem;
            color: var(--danger);
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-reset:hover {
            background: var(--danger);
            color: white;
        }

        /* لوحة المعلومات */
        .info-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 20px;
        }

        .info-header {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: bold;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
        }

        .badge.emergency {
            background: rgba(255,68,68,0.2);
            color: var(--danger);
            border-color: var(--danger);
        }

        .badge.normal {
            background: rgba(0,242,255,0.2);
            color: var(--primary);
            border-color: var(--primary);
        }

        .badge.depth {
            background: rgba(255,215,0,0.2);
            color: var(--secondary);
            border-color: var(--secondary);
        }

        .hint {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.6;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            border-right: 3px solid var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- الهيدر -->
    <div class="header">
        <h1 class="brand">QDS</h1>
        <div class="credit">
            <span>👤 Al FaTeh</span>
            <span>📱 01016057623</span>
            <span>🎯 32768</span>
        </div>
    </div>

    <!-- الحالة -->
    <div class="status-container">
        <div id="status" class="status">⚡</div>
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">المستوى</div>
                <div class="stat-value max" id="maxLevel">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">النقاط</div>
                <div class="stat-value" id="totalScore">0</div>
            </div>
        </div>
    </div>

    <!-- اللوحة -->
    <div class="game-panel">
        <div id="grid" class="grid"></div>

        <button class="btn-primary" id="mainBtn" onclick="deepThink()">
            ⚡ تحليل ذكي (عمق 14)
        </button>

        <div class="direction-grid">
            <button class="btn-dir" onclick="manualUp()">↑</button>
            <button class="btn-dir" onclick="manualDown()">↓</button>
            <button class="btn-dir" onclick="manualLeft()">←</button>
            <button class="btn-dir" onclick="manualRight()">→</button>
        </div>

        <button class="btn-reset" onclick="resetGame()">🔄 بداية جديدة</button>
    </div>

    <!-- المعلومات -->
    <div class="info-panel">
        <div class="info-header" id="infoPanel">
            <span class="badge normal">🔵 وضع طبيعي</span>
            <span class="badge depth">⏱️ عمق 0</span>
        </div>
        <div class="hint" id="hintText">
            أدخل الأرقام من اللعبة ثم اضغط تحليل
        </div>
    </div>
</div>

<script>
// ========== تهيئة اللوحة ==========
const grid = document.getElementById("grid")
for(let i = 0; i < 16; i++)
    grid.innerHTML += `<div class="tile"><input id="t${i}" type="number" min="0" max="20" placeholder="0"></div>`

// ========== المتغيرات العامة ==========
let cache = new Map()
let thinking = false
let gameState = {
    maxLevel: 0,
    criticalMode: false,
    reachedLevel15: false,
    movesSinceCritical: 0
}

// ========== دوال المساعدة ==========
function getBoard() {
    let b = []
    for(let i = 0; i < 4; i++) {
        let r = []
        for(let j = 0; j < 4; j++) {
            let val = parseInt(document.getElementById("t" + (i*4 + j)).value) || 0
            r.push(val)
        }
        b.push(r)
    }
    return b
}

function setBoard(b) {
    for(let i = 0; i < 4; i++)
        for(let j = 0; j < 4; j++)
            document.getElementById("t" + (i*4 + j)).value = b[i][j] || ""
}

function getMaxLevel(b) {
    let max = 0
    for(let i = 0; i < 4; i++)
        for(let j = 0; j < 4; j++)
            if(b[i][j] > max) max = b[i][j]
    return max
}

function calculateScore(b) {
    let score = 0
    for(let i = 0; i < 4; i++)
        for(let j = 0; j < 4; j++)
            if(b[i][j] > 0)
                score += Math.pow(2, b[i][j])
    return score
}

function updateDisplay(b) {
    let maxLevel = getMaxLevel(b)
    let totalScore = calculateScore(b)
    
    document.getElementById("maxLevel").innerText = maxLevel
    document.getElementById("totalScore").innerText = totalScore.toLocaleString()
    
    gameState.maxLevel = maxLevel
    
    if(maxLevel >= 15 && !gameState.reachedLevel15) {
        gameState.reachedLevel15 = true
        document.getElementById("status").className = "status legend"
        document.getElementById("status").innerText = "👑 15!"
        document.getElementById("mainBtn").className = "btn-primary legend"
    }
    else if(maxLevel >= 12) {
        document.getElementById("status").className = "status warning"
    }
    else if(gameState.criticalMode) {
        document.getElementById("status").className = "status danger"
    }
    else {
        document.getElementById("status").className = "status"
    }
}

// ========== دوال اللعبة ==========
function compress(row) {
    let n = row.filter(v => v > 0)
    
    for(let i = 0; i < n.length - 1; i++) {
        if(n[i] == n[i + 1] && n[i] > 0) {
            n[i] += 1
            n.splice(i + 1, 1)
        }
    }
    
    while(n.length < 4) n.push(0)
    return n
}

function simulate(b, dir) {
    let old = JSON.stringify(b)
    
    if(dir == "left") {
        for(let i = 0; i < 4; i++) b[i] = compress(b[i])
    }
    else if(dir == "right") {
        for(let i = 0; i < 4; i++) {
            b[i].reverse()
            b[i] = compress(b[i])
            b[i].reverse()
        }
    }
    else if(dir == "up") {
        for(let j = 0; j < 4; j++) {
            let c = [b[0][j], b[1][j], b[2][j], b[3][j]]
            let nc = compress(c)
            for(let i = 0; i < 4; i++) b[i][j] = nc[i]
        }
    }
    else if(dir == "down") {
        for(let j = 0; j < 4; j++) {
            let c = [b[0][j], b[1][j], b[2][j], b[3][j]]
            c.reverse()
            let nc = compress(c)
            nc.reverse()
            for(let i = 0; i < 4; i++) b[i][j] = nc[i]
        }
    }
    
    return old != JSON.stringify(b)
}

function emptyCells(b) {
    let e = []
    for(let i = 0; i < 4; i++)
        for(let j = 0; j < 4; j++)
            if(b[i][j] == 0) e.push([i, j])
    return e
}

// ========== التحقق الذكي من الحركة ==========
function hasAvailableMoves(b) {
    // 1. لو في خلايا فارغة => حركة
    let empty = emptyCells(b).length
    if(empty > 0) {
        console.log(`✅ في ${empty} خلايا فارغة`)
        return true
    }
    
    // 2. فحص الدمج الأفقي
    for(let i = 0; i < 4; i++) {
        for(let j = 0; j < 3; j++) {
            if(b[i][j] == b[i][j+1] && b[i][j] > 0) {
                console.log(`✅ دمج أفقي: ${b[i][j]}`)
                return true
            }
        }
    }
    
    // 3. فحص الدمج العمودي
    for(let j = 0; j < 4; j++) {
        for(let i = 0; i < 3; i++) {
            if(b[i][j] == b[i+1][j] && b[i][j] > 0) {
                console.log(`✅ دمج عمودي: ${b[i][j]}`)
                return true
            }
        }
    }
    
    return false
}

// ========== تقييم الوضع ==========
function evaluate(b, critical = false) {
    let score = 0
    let empty = emptyCells(b).length
    let maxVal = getMaxLevel(b)
    
    if(critical) {
        // وضع الطوارئ: دمج سريع
        score += empty * 50000
        
        for(let i = 0; i < 4; i++) {
            for(let j = 0; j < 3; j++) {
                if(b[i][j] == b[i][j+1] && b[i][j] > 0)
                    score += b[i][j] * 3000
            }
        }
        for(let j = 0; j < 4; j++) {
            for(let i = 0; i < 3; i++) {
                if(b[i][j] == b[i+1][j] && b[i][j] > 0)
                    score += b[i][j] * 3000
            }
        }
    } else {
        // الوضع العادي: بناء استراتيجي
        score += empty * 15000
        
        // مكافأة الزوايا
        if(b[0][0] == maxVal) score += maxVal * 2000
        else if(b[0][3] == maxVal || b[3][0] == maxVal) score += maxVal * 1500
        else if(b[3][3] == maxVal) score += maxVal * 1000
        else score -= maxVal * 500
        
        // مكافأة التجانس
        for(let i = 0; i < 4; i++) {
            for(let j = 0; j < 3; j++) {
                if(b[i][j] == b[i][j+1] && b[i][j] > 0)
                    score += b[i][j] * 800
            }
        }
        
        // عقاب المنتصف
        for(let i = 1; i < 3; i++) {
            for(let j = 1; j < 3; j++) {
                score -= b[i][j] * 300
            }
        }
        
        // مكافآت المستويات العالية
        if(maxVal >= 12) score += 100000
        if(maxVal >= 13) score += 200000
        if(maxVal >= 14) score += 500000
        if(maxVal >= 15) score += 1000000
    }
    
    return score
}

// ========== Minimax مع تقليم ==========
function minimax(b, depth, alpha, beta, isMax, critical) {
    if(depth == 0) return evaluate(b, critical)
    
    let key = JSON.stringify(b) + depth + isMax + critical
    if(cache.has(key)) return cache.get(key)
    
    if(isMax) {
        let moves = ["up", "down", "left", "right"]
        let best = -Infinity
        
        for(let m of moves) {
            let sim = JSON.parse(JSON.stringify(b))
            if(!simulate(sim, m)) continue
            
            let val = minimax(sim, depth - 1, alpha, beta, false, critical)
            best = Math.max(best, val)
            alpha = Math.max(alpha, val)
            if(beta <= alpha) break
        }
        
        cache.set(key, best)
        return best
    } else {
        let empty = emptyCells(b)
        if(empty.length == 0) return evaluate(b, critical)
        
        let best = Infinity
        
        for(let [i, j] of empty) {
            for(let val of [1, 2]) {
                let sim = JSON.parse(JSON.stringify(b))
                sim[i][j] = val
                let val2 = minimax(sim, depth - 1, alpha, beta, true, critical)
                best = Math.min(best, val2)
                beta = Math.min(beta, val2)
                if(beta <= alpha) break
            }
        }
        
        cache.set(key, best)
        return best
    }
}

// ========== تحليل الموقف ==========
function analyzeSituation(b) {
    let empty = emptyCells(b).length
    let maxVal = getMaxLevel(b)
    
    if(maxVal >= 12 && empty <= 4) return true
    if(maxVal >= 10 && empty <= 3) return true
    if(maxVal >= 8 && empty <= 2) return true
    if(empty <= 1) return true
    if(gameState.criticalMode && gameState.movesSinceCritical < 3) {
        gameState.movesSinceCritical++
        return true
    }
    
    gameState.criticalMode = false
    gameState.movesSinceCritical = 0
    return false
}

// ========== عرض السهم ==========
function showArrow(move) {
    const arrows = { up: "↑", down: "↓", left: "←", right: "→" }
    let arrow = arrows[move] || "⚡"
    
    if(gameState.reachedLevel15) arrow = "👑 " + arrow
    else if(gameState.maxLevel >= 12) arrow = "🏆 " + arrow
    
    document.getElementById("status").innerText = arrow
}

// ========== التحليل الرئيسي ==========
function deepThink() {
    if(thinking) return
    
    let b = getBoard()
    
    // التحقق من وجود حركة
    if(!hasAvailableMoves(b)) {
        document.getElementById("status").innerText = "💀 انتهت"
        document.getElementById("status").className = "status danger"
        document.getElementById("hintText").innerHTML = "💀 انتهت اللعبة - اضغط بداية جديدة"
        return
    }
    
    thinking = true
    document.getElementById("status").innerText = "⏳"
    
    setTimeout(() => {
        if(cache.size > 200000) cache.clear()
        
        let b = getBoard()
        let empty = emptyCells(b).length
        let maxVal = getMaxLevel(b)
        
        let criticalMode = analyzeSituation(b)
        gameState.criticalMode = criticalMode
        
        // تحديد العمق
        let depth = 14
        if(!criticalMode) {
            if(maxVal >= 12) depth = 13
            else if(maxVal >= 10) depth = 12
            else if(maxVal >= 8) depth = 11
            else if(maxVal >= 6) depth = 10
            else depth = 9
        }
        
        // تحديث المعلومات
        let strategyText = criticalMode ? 
            '<span class="badge emergency">🚨 طوارئ</span>' : 
            '<span class="badge normal">🔵 عادي</span>'
        
        let emptyText = empty > 0 ? 
            `<span class="badge normal">📦 ${empty}</span>` : 
            '<span class="badge emergency">📦 ممتلئ</span>'
        
        document.getElementById("infoPanel").innerHTML = 
            strategyText + ` <span class="badge depth">⏱️ عمق ${depth}</span> ` + emptyText
        
        // تقييم الحركات
        let moves = ["up", "down", "left", "right"]
        let moveScores = []
        
        for(let m of moves) {
            let sim = JSON.parse(JSON.stringify(b))
            if(!simulate(sim, m)) continue
            moveScores.push({
                move: m,
                score: evaluate(sim, criticalMode)
            })
        }
        
        if(moveScores.length === 0) {
            document.getElementById("status").innerText = "❌"
            thinking = false
            return
        }
        
        moveScores.sort((a, b) => b.score - a.score)
        
        // تحليل عميق لأفضل 3 حركات
        let bestMove = ""
        let bestScore = -Infinity
        
        for(let i = 0; i < Math.min(3, moveScores.length); i++) {
            let sim = JSON.parse(JSON.stringify(b))
            simulate(sim, moveScores[i].move)
            let score = minimax(sim, depth - 1, -Infinity, Infinity, false, criticalMode)
            
            if(score > bestScore) {
                bestScore = score
                bestMove = moveScores[i].move
            }
        }
        
        if(bestMove) {
            simulate(b, bestMove)
            setBoard(b)
            updateDisplay(b)
            showArrow(bestMove)
            
            if(empty === 0) {
                document.getElementById("hintText").innerHTML = "⚠️ لوحة ممتلئة - ركز على الدمج"
            } else {
                document.getElementById("hintText").innerHTML = "✅ تحليل ناجح - اتبع السهم"
            }
        }
        
        thinking = false
    }, 10)
}

// ========== الحركات اليدوية ==========
function manualUp() { manualMove("up") }
function manualDown() { manualMove("down") }
function manualLeft() { manualMove("left") }
function manualRight() { manualMove("right") }

function manualMove(dir) {
    if(thinking) return
    
    let b = getBoard()
    
    if(simulate(b, dir)) {
        setBoard(b)
        updateDisplay(b)
        showArrow(dir)
        
        if(emptyCells(b).length === 0) {
            document.getElementById("hintText").innerHTML = "⚠️ اللوحة ممتلئة - استمر في الدمج"
        }
    } else {
        document.getElementById("hintText").innerHTML = `⛔ حركة ${dir} غير ممكنة`
    }
}

// ========== إعادة التعيين ==========
function resetGame() {
    if(thinking) return
    
    for(let i = 0; i < 16; i++)
        document.getElementById("t" + i).value = ""
    
    gameState = {
        maxLevel: 0,
        criticalMode: false,
        reachedLevel15: false,
        movesSinceCritical: 0
    }
    
    document.getElementById("status").className = "status"
    document.getElementById("status").innerText = "⚡"
    document.getElementById("mainBtn").className = "btn-primary"
    document.getElementById("maxLevel").innerText = "0"
    document.getElementById("totalScore").innerText = "0"
    document.getElementById("infoPanel").innerHTML = 
        '<span class="badge normal">🔵 وضع طبيعي</span> <span class="badge depth">⏱️ عمق 0</span>'
    document.getElementById("hintText").innerHTML = "📝 أدخل الأرقام ثم اضغط تحليل"
    
    cache.clear()
}

// ========== بداية التشغيل ==========
window.onload = resetGame
</script>
