<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QDS AI - Corrected Edition</title>
    <style>
        :root { --bg: #050505; --accent: #00f2ff; --panel: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; text-align: center; overflow-x: hidden; }
        
        .container { max-width: 420px; margin: auto; }
        
        /* شعار QDS المضيء */
        .brand-name { font-size: 3.5rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 15px var(--accent); letter-spacing: 5px; margin: 20px 0 5px; }
        .sub-title { font-size: 0.8rem; color: #555; margin-bottom: 20px; }

        /* حالة المحرك */
        .status-box { background: var(--panel); border: 1px solid var(--accent); padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 0.9rem; border: 1px solid var(--accent); }
        #status-text { color: var(--accent); font-weight: bold; }

        /* الشبكة Grid */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: #222; padding: 12px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .tile { aspect-ratio: 1; background: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        .tile input { width: 100%; height: 100%; background: transparent; border: none; color: var(--accent); text-align: center; font-size: 1.6rem; font-weight: bold; outline: none; padding: 0; }
        
        /* أزرار التحكم */
        .btn-ai { background: var(--accent); color: #000; width: 100%; padding: 20px; border-radius: 15px; font-weight: 900; font-size: 1.3rem; border: none; cursor: pointer; box-shadow: 0 5px 20px rgba(0, 242, 255, 0.4); margin-bottom: 25px; }
        .btn-ai:active { transform: scale(0.97); }
        
        .nav-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 280px; margin: auto; }
        .btn-move { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 15px; border-radius: 12px; font-size: 1.2rem; cursor: pointer; }
        .btn-move:active { background: var(--accent); color: #000; }

        .footer-text { margin-top: 40px; font-size: 0.7rem; color: #333; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="brand-name">QDS</h1>
    <div class="sub-title">نظام التحكم الذكي بالوحوش - نسخة مصححة</div>
    
    <div class="status-box">
        الوضعية: <span id="status-text">جاهز للتحليل</span>
    </div>

    <div class="grid" id="mainGrid"></div>

    <button class="btn-ai" onclick="deepThink()">تحليل وحركة QDS ⚡</button>

    <div class="nav-controls">
        <div></div><button class="btn-move" onclick="manualMove('up')">↑</button><div></div>
        <button class="btn-move" onclick="manualMove('left')">←</button>
        <button class="btn-move" onclick="manualMove('down')">↓</button>
        <button class="btn-move" onclick="manualMove('right')">→</button>
    </div>

    <button onclick="clearGrid()" style="margin-top: 25px; background:none; border:none; color:#444; cursor:pointer; font-size:0.8rem;">تصفير الساحة 🗑️</button>
    
    <div class="footer-text">QDS SYSTEM ONLINE</div>
</div>

<script>
    // إنشاء المربعات
    const gridEl = document.getElementById('mainGrid');
    for(let i=0; i<16; i++) {
        gridEl.innerHTML += `<div class="tile"><input type="number" id="t-${i}" placeholder="0" inputmode="numeric"></div>`;
    }

    // استراتيجية الوزن (التركيز على الزاوية)
    const WEIGHTS = [
        [2, 4, 8, 16],
        [32, 64, 128, 256],
        [1024, 512, 256, 128],
        [2048, 4096, 8192, 16384]
    ];

    function getMatrix() {
        let m = [];
        for(let i=0; i<4; i++) {
            let r = [];
            for(let j=0; j<4; j++) r.push(parseInt(document.getElementById(`t-${i*4+j}`).value) || 0);
            m.push(r);
        }
        return m;
    }

    function setMatrix(m) {
        for(let i=0; i<4; i++) {
            for(let j=0; j<4; j++) document.getElementById(`t-${i*4+j}`).value = m[i][j] || "";
        }
    }

    function compress(row) {
        let n = row.filter(v => v !== 0);
        for(let i=0; i<n.length-1; i++) { if(n[i] === n[i+1]) { n[i]*=2; n.splice(i+1,1); } }
        while(n.length < 4) n.push(0);
        return n;
    }

    function simulateLogic(m, dir) {
        const old = JSON.stringify(m);
        if(dir === 'left' || dir === 'right') {
            for(let i=0; i<4; i++) {
                let row = [...m[i]]; 
                if(dir === 'right') row.reverse(); // عكس الصف للحركة لليمين
                let newRow = compress(row); 
                if(dir === 'right') newRow.reverse(); // إعادة الصف لوضعه الطبيعي
                m[i] = newRow;
            }
        } else {
            for(let j=0; j<4; j++) {
                let col = [m[0][j], m[1][j], m[2][j], m[3][j]]; 
                if(dir === 'down') col.reverse(); // عكس العمود للحركة لأسفل
                let newCol = compress(col); 
                if(dir === 'down') newCol.reverse(); // إعادة العمود لوضعه الطبيعي
                for(let i=0; i<4; i++) m[i][j] = newCol[i];
            }
        }
        return old !== JSON.stringify(m);
    }

    function deepThink() {
        const current = getMatrix();
        let bestS = -1, bestM = '';
        ['up', 'down', 'left', 'right'].forEach(move => {
            let sim = JSON.parse(JSON.stringify(current));
            if(simulateLogic(sim, move)) {
                let score = 0;
                for(let i=0; i<4; i++) for(let j=0; j<4; j++) score += sim[i][j] * WEIGHTS[i][j];
                if(score > bestS) { bestS = score; bestM = move; }
            }
        });
        if(bestM) {
            manualMove(bestM);
            const dNames = {up:'لأعلى ↑', down:'لأسفل ↓', left:'لليسار ←', right:'لليمين →'};
            document.getElementById('status-text').innerText = "تم التحرك " + dNames[bestM];
        } else {
            document.getElementById('status-text').innerText = "لا توجد حركات مفيدة";
        }
    }

    function manualMove(d) {
        let m = getMatrix();
        if(simulateLogic(m, d)) setMatrix(m);
    }

    function clearGrid() {
        for(let i=0; i<16; i++) document.getElementById(`t-${i}`).value = "";
        document.getElementById('status-text').innerText = "تم تصفير الساحة";
    }
</script>

</body>
</html>
