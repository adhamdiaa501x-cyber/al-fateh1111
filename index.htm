<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QDS AI Control Panel</title>
    <style>
        :root { --bg: #050505; --accent: #00f2ff; --panel: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; text-align: center; overflow-x: hidden; }
        
        .container { max-width: 400px; margin: auto; }
        
        /* تصميم شعار QDS الاحترافي */
        .brand-header { margin-top: 20px; margin-bottom: 20px; }
        .brand-name { font-size: 3.5rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 15px var(--accent), 0 0 30px var(--accent); letter-spacing: 5px; margin: 0; transition: 0.3s; }
        .brand-name:hover { transform: scale(1.05); }
        .sub-title { font-size: 0.8rem; color: #666; margin-top: 5px; letter-spacing: 1px; }

        /* حالة المحرك */
        .ai-status { background: var(--panel); border: 2px solid var(--accent); padding: 15px; border-radius: 15px; margin: 15px 0; box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
        .status-label { font-size: 0.9rem; color: #888; }
        #status-text { color: var(--accent); font-weight: bold; }

        /* الشبكة (Grid) */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: #222; padding: 12px; border-radius: 15px; margin: 20px 0; border: 1px solid #333; }
        .tile { aspect-ratio: 1; background: #000; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; transition: 0.2s; }
        .tile:focus-within { border-color: var(--accent); box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.2); }
        .tile input { width: 100%; height: 100%; background: transparent; border: none; color: var(--accent); text-align: center; font-size: 1.6rem; font-weight: bold; outline: none; padding: 0; }
        
        /* أزرار التحكم */
        .btn-ai { background: var(--accent); color: #000; width: 100%; padding: 20px; border-radius: 15px; font-weight: 900; font-size: 1.3rem; border: none; cursor: pointer; box-shadow: 0 5px 20px rgba(0, 242, 255, 0.3); transition: 0.3s; margin-bottom: 20px; }
        .btn-ai:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(0, 242, 255, 0.2); }
        
        .nav-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 250px; margin: auto; }
        .btn-m { background: #111; color: #fff; border: 1px solid #333; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .btn-m:active { background: var(--accent); color: #000; }

        .footer { margin-top: 30px; font-size: 0.7rem; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <h1 class="brand-name">QDS</h1>
        <div class="sub-title">نظام التحكم الذكي بالوحوش</div>
    </div>
    
    <div class="ai-status">
        <span class="status-label">الحالة:</span> <span id="status-text">بانتظار البيانات...</span>
    </div>

    <div class="grid" id="mainGrid"></div>

    <button class="btn-ai" onclick="deepThink()">تحليل وحركة QDS ⚡</button>

    <div class="nav-controls">
        <div></div><button class="btn-m" onclick="manualMove('up')">↑</button><div></div>
        <button class="btn-m" onclick="manualMove('left')">←</button>
        <button class="btn-m" onclick="manualMove('down')">↓</button>
        <button class="btn-m" onclick="manualMove('right')">→</button>
    </div>

    <button onclick="clearGrid()" style="margin-top: 25px; background:none; border:none; color:#555; cursor:pointer; font-size:0.8rem;">تصفير الساحة 🗑️</button>

    <div class="footer">ENGINEERED BY QDS SYSTEM</div>
</div>

<script>
    // بناء الشبكة
    const gridEl = document.getElementById('mainGrid');
    for(let i=0; i<16; i++) {
        gridEl.innerHTML += `<div class="tile"><input type="number" id="t-${i}" placeholder="0" inputmode="numeric"></div>`;
    }

    // مصفوفة الأوزان (استراتيجية الزاوية)
    const W = [
        [2, 4, 8, 16],
        [32, 64, 128, 256],
        [1024, 512, 256, 128],
        [2048, 4096, 8192, 16384]
    ];

    function getM() {
        let m = [];
        for(let i=0; i<4; i++) {
            let r = [];
            for(let j=0; j<4; j++) r.push(parseInt(document.getElementById(`t-${i*4+j}`).value) || 0);
            m.push(r);
        }
        return m;
    }

    function setM(m) {
        for(let i=0; i<4; i++) {
            for(let j=0; j<4; j++) document.getElementById(`t-${i*4+j}`).value = m[i][j] || "";
        }
    }

    function moveLogic(m, dir) {
        const old = JSON.stringify(m);
        const comp = (r) => {
            let n = r.filter(v => v !== 0);
            for(let i=0; i<n.length-1; i++) if(n[i]===n[i+1]) { n[i]*=2; n.splice(i+1,1); }
            while(n.length<4) n.push(0);
            return n;
        };
        if(dir==='left'||dir==='right'){
            for(let i=0; i<4; i++){
                let r = [...m[i]]; if(dir==='right') r.reverse();
                let nr = comp(r); if(dir==='right') nr.reverse();
                m[i] = nr;
            }
        } else {
            for(let j=0; j<4; j++){
                let c = [m[0][j],m[1][j],m[2][j],m[3][j]]; if(dir==='down') c.reverse();
                let nc = comp(c); if(dir==='down') nc.reverse();
                for(let i=0; i<4; i++) m[i][j] = nc[i];
            }
        }
        return old !== JSON.stringify(m);
    }

    function deepThink() {
        const current = getM();
        let bs = -1, bm = '';
        ['up','down','left','right'].forEach(v => {
            let s = JSON.parse(JSON.stringify(current));
            if(moveLogic(s, v)) {
                let sc = 0;
                for(let i=0; i<4; i++) for(let j=0; j<4; j++) sc += s[i][j] * W[i][j];
                if(sc > bs) { bs = sc; bm = v; }
            }
        });
        if(bm) {
            manualMove(bm);
            const names = {up:'لأعلى ↑', down:'لأسفل ↓', left:'لليسار ←', right:'لليمين →'};
            document.getElementById('status-text').innerText = "تم تطبيق حركة " + names[bm];
        } else {
            document.getElementById('status-text').innerText = "لا يوجد حركات متاحة";
        }
    }

    function manualMove(d) {
        let m = getM();
        if(moveLogic(m, d)) setM(m);
    }

    function clearGrid() {
        for(let i=0; i<16; i++) document.getElementById(`t-${i}`).value = "";
        document.getElementById('status-text').innerText = "تم تصفير الساحة";
    }
</script>

</body>
</html>
