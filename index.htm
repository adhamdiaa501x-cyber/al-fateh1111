<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QDS SUPER AI</title>

<style>

:root{
--bg:#050505;
--accent:#00f2ff;
--panel:#111;
}

body{
background:var(--bg);
color:#fff;
font-family:Segoe UI;
text-align:center;
padding:15px;
}

.container{
max-width:420px;
margin:auto;
}

.brand{
font-size:3rem;
color:var(--accent);
font-weight:900;
text-shadow:0 0 20px var(--accent);
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
background:#222;
padding:12px;
border-radius:15px;
margin:20px 0;
}

.tile{
aspect-ratio:1;
background:#000;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
}

.tile input{
width:100%;
height:100%;
background:transparent;
border:none;
color:var(--accent);
font-size:1.6rem;
text-align:center;
outline:none;
}

.btn{
background:var(--accent);
border:none;
padding:18px;
border-radius:12px;
font-weight:900;
cursor:pointer;
width:100%;
margin:10px 0;
}

</style>
</head>

<body>

<div class="container">

<h1 class="brand">QDS AI</h1>

<div class="grid" id="grid"></div>

<button class="btn" onclick="think()">تحليل حركة</button>
<button class="btn" onclick="autoPlay()">AUTO PLAY</button>

</div>

<script>

const grid=document.getElementById("grid")

for(let i=0;i<16;i++)
grid.innerHTML+=`<div class="tile"><input id="t${i}" type="number"></div>`

function getBoard(){

let b=[]

for(let i=0;i<4;i++){

let r=[]

for(let j=0;j<4;j++)
r.push(parseInt(document.getElementById("t"+(i*4+j)).value)||0)

b.push(r)

}

return b

}

function setBoard(b){

for(let i=0;i<4;i++)
for(let j=0;j<4;j++)
document.getElementById("t"+(i*4+j)).value=b[i][j]||""

}

function compress(row){

let n=row.filter(v=>v)

for(let i=0;i<n.length-1;i++){

if(n[i]==n[i+1]){

n[i]+=1
n.splice(i+1,1)

}

}

while(n.length<4)n.push(0)

return n

}

function simulate(b,dir){

let old=JSON.stringify(b)

if(dir=="left")
for(let i=0;i<4;i++)b[i]=compress(b[i])

if(dir=="right")
for(let i=0;i<4;i++){
b[i].reverse()
b[i]=compress(b[i])
b[i].reverse()
}

if(dir=="up")
for(let j=0;j<4;j++){

let c=[b[0][j],b[1][j],b[2][j],b[3][j]]
let nc=compress(c)

for(let i=0;i<4;i++)b[i][j]=nc[i]

}

if(dir=="down")
for(let j=0;j<4;j++){

let c=[b[0][j],b[1][j],b[2][j],b[3][j]]
c.reverse()

let nc=compress(c)
nc.reverse()

for(let i=0;i<4;i++)b[i][j]=nc[i]

}

return old!=JSON.stringify(b)

}

function emptyCells(b){

let e=[]

for(let i=0;i<4;i++)
for(let j=0;j<4;j++)
if(b[i][j]==0)e.push([i,j])

return e

}

function evaluate(b){

let score=0
let empty=emptyCells(b).length

for(let i=0;i<4;i++)
for(let j=0;j<4;j++){

let v=b[i][j]

score+=v*Math.pow(2,i+j)

}

score+=empty*5000

return score

}

function expectimax(b,depth,player){

if(depth==0)return evaluate(b)

if(player){

let best=-Infinity

let moves=["up","down","left","right"]

for(let m of moves){

let sim=JSON.parse(JSON.stringify(b))

if(!simulate(sim,m))continue

let val=expectimax(sim,depth-1,false)

if(val>best)best=val

}

return best

}

else{

let cells=emptyCells(b)

if(cells.length==0)return evaluate(b)

let score=0

for(let c of cells){

let sim=JSON.parse(JSON.stringify(b))

sim[c[0]][c[1]]=1

score+=expectimax(sim,depth-1,true)

}

return score/cells.length

}

}

function think(){

let b=getBoard()

let moves=["up","down","left","right"]

let bestMove=""
let bestScore=-Infinity

for(let m of moves){

let sim=JSON.parse(JSON.stringify(b))

if(!simulate(sim,m))continue

let score=expectimax(sim,12,false)

if(score>bestScore){

bestScore=score
bestMove=m

}

}

if(bestMove){

simulate(b,bestMove)
setBoard(b)

}

}

let auto=false

function autoPlay(){

auto=!auto

if(auto)loop()

}

function loop(){

if(!auto)return

think()

setTimeout(loop,100)

}

</script>

</body>
</html>
