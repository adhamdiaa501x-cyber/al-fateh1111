<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <!-- تحسينات SEO ومشاركة الموقع -->
    <meta name="description" content="أداة احترافية لتحليل ودمج الوحوش في لعبة الفاتحون - نظام ذكاء اصطناعي متطور">
    <meta name="keywords" content="الفاتحون, دمج وحوش, QDS, العاب استراتيجية">

    <!-- أيقونة الموقع -->
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='10' y='80' font-size='80' fill='%2300f2ff'%3E⚡%3C/text%3E%3C/svg%3E">

    <style>
        /* ========== نظام الألوان الاحترافي ========== */
        :root {
            --primary: #00f2ff;
            --primary-dark: #00a2cc;
            --primary-glow: rgba(0, 242, 255, 0.5);
            --secondary: #ffd700;
            --danger: #ff4444;
            --success: #00ff88;
            --legend: #aa88ff;
            
            --bg-dark: #0a0a0f;
            --bg-panel: #111116;
            --bg-card: #1a1a24;
            
            --text-primary: #ffffff;
            --text-secondary: #aaaac0;
            --border-color: #2a2a35;
            
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 8px 30px rgba(0, 242, 255, 0.2);
            --shadow-glow: 0 0 30px var(--primary-glow);
            
            --gradient-gold: linear-gradient(135deg, #ffd700, #ffaa00);
            --gradient-primary: linear-gradient(135deg, #00f2ff, #0088ff);
            --gradient-legend: linear-gradient(135deg, #aa88ff, #cc88ff);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة احترافية */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(170, 136, 255, 0.1) 0%, transparent 30%),
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.02) 0px, rgba(255, 255, 255, 0.02) 1px, transparent 1px, transparent 10px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 500px;
            width: 100%;
            margin: auto;
            position: relative;
            z-index: 1;
        }

        /* ========== الهيدر الاحترافي ========== */
        .header {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gradient-primary);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .brand {
            font-size: 3.5rem;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: var(--shadow-glow);
            margin-bottom: 10px;
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
        }

        .brand::after {
            content: 'PRO';
            font-size: 1rem;
            background: var(--gradient-gold);
            padding: 4px 8px;
            border-radius: 20px;
            position: absolute;
            top: 5px;
            left: -20px;
            color: var(--bg-dark);
            font-weight: bold;
            -webkit-text-fill-color: initial;
        }

        .credit {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: var(--text-secondary);
            font-size: 1rem;
            flex-wrap: wrap;
        }

        .credit-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            border: 1px solid var(--border-color);
        }

        /* ========== شاشة الحالة المتطورة ========== */
        .status-container {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
        }

        .status {
            font-size: 4rem;
            text-align: center;

            border-radius: 20px;
            background: var(--bg-card);
            border: 2px solid var(--border-color);

        }

        .status.warning {
            border-color: var(--secondary);

        }

        .status.danger {
            border-color: var(--danger);

        .status.legend {
            border-color: var(--legend);
            box-shadow: 0 0 50px rgba(170, 136, 255, 0.5);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 15px;
            text-align: center;

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: var(--shadow-glow);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .stat-value {

            line-height: 1;
        }

        .stat-value.max-level {
            color: var(--secondary);

        /* ========== اللوحة الرئيسية ========== */
        .game-container {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .tile {
            aspect-ratio: 1;
            background: var(--bg-dark);
            border-radius: 15px;
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tile::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .tile:hover::before {
            opacity: 1;
        }

        .tile input {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        .tile input:focus {
            transform: scale(1.05);
            text-shadow: 0 0 20px var(--primary);
        }

        /* ألوان المستويات */
        .tile input[value="1"] { color: #88ccff; }
        .tile input[value="2"] { color: #88ff88; }
        .tile input[value="3"] { color: #ffff88; }
        .tile input[value="4"] { color: #ffaa88; }
        .tile input[value="5"] { color: #ff8888; }
        .tile input[value="6"] { color: #ff88ff; }
        .tile input[value="7"] { color: #ddaaff; }
        .tile input[value="8"] { color: #aaccff; text-shadow: 0 0 10px #0088ff; }
        .tile input[value="9"] { color: #ffaa00; text-shadow: 0 0 10px #ff8800; }
        .tile input[value="10"] { color: #ff5500; text-shadow: 0 0 20px #ff4400; }
        .tile input[value="11"] { color: #ff00ff; text-shadow: 0 0 20px #ff00ff; }
        .tile input[value="12"] { color: #ffdd00; text-shadow: 0 0 20px #ffaa00; }
        .tile input[value="13"] { color: #ffaa88; text-shadow: 0 0 20px #ff5500; font-size: 2rem; }
        .tile input[value="14"] { color: #ff8888; text-shadow: 0 0 30px #ff0000; font-size: 2rem; }
        .tile input[value="15"] { color: #ffffff; text-shadow: 0 0 40px #ffffff; font-size: 2.2rem; font-weight: 900; }

        /* ========== أزرار التحكم ========== */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-primary {
            background: var(--gradient-primary);
            border: none;
            padding: 20px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--bg-dark);
            cursor: pointer;
            box-shadow: 0 5px 0 var(--primary-dark), var(--shadow-md);
            transition: all 0.1s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-primary:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 var(--primary-dark), var(--shadow-md);
        }

        .btn-primary.legend {
            background: var(--gradient-legend);
            box-shadow: 0 5px 0 #8866cc, var(--shadow-md);
        }

        .direction-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .btn-direction {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            padding: 15px;
            border-radius: 30px;
            font-size: 2rem;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-direction:hover {
            border-color: var(--primary);
            transform: scale(1.05);
            box-shadow: var(--shadow-glow);
        }

        .btn-reset {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            padding: 15px;
            border-radius: 30px;
            font-size: 1.5rem;
            color: var(--danger);
            cursor: pointer;
            transition: all 0.3s ease;
            grid-column: span 4;
        }

        .btn-reset:hover {
            border-color: var(--danger);
            color: var(--danger);
            transform: scale(1.02);
        }

        /* ========== لوحة المعلومات ========== */
        .info-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: var(--shadow-md);
        }

        .info-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        .info-content {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .badge {
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
        }

        .badge.emergency {
            background: rgba(255, 68, 68, 0.2);
            color: var(--danger);
            border-color: var(--danger);
        }

        .badge.normal {
            background: rgba(0, 242, 255, 0.2);
            color: var(--primary);
            border-color: var(--primary);
        }

        .badge.depth {
            background: rgba(255, 215, 0, 0.2);
            color: var(--secondary);
            border-color: var(--secondary);
        }

        /* ========== تلميحات متحركة ========== */
        .hint-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border-right: 3px solid var(--primary);
        }

        /* ========== أنيميشن ========== */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .pulse {
            animation: pulse 2s ease infinite;
        }

        /* ========== تنسيق الجوال ========== */
        @media (max-width: 480px) {
            .brand { font-size: 2.8rem; }
            .status { font-size: 3rem; }
            .stat-value { font-size: 2rem; }
            .tile input { font-size: 1.4rem; }
            .btn-primary { font-size: 1.2rem; padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- الهيدر الاحترافي -->
    <div class="header">
        <h1 class="brand">QDS</h1>
        <div class="credit">
            <span class="credit-item">👤 Al FaTeh</span>
            <span class="credit-item">📱 01016057623</span>
            <span class="credit-item">🎯 هدف 32768</span>
        </div>
    </div>

    <!-- شاشة الحالة -->
    <div class="status-container">
        <div id="status" class="status">⚡</div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">المستوى الأقصى</div>
                <div class="stat-value max-level" id="maxLevel">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">إجمالي النقاط</div>
                <div class="stat-value" id="totalScore">0</div>
            </div>
        </div>
    </div>

    <!-- لوحة اللعب -->
    <div class="game-container">
        <div id="grid" class="grid"></div>

        <!-- أزرار التحكم -->
        <div class="control-panel">
            <button class="btn-primary" id="mainBtn" onclick="deepThink()">
                ⚡ تحليل ذكي متطور
            </button>

            <div class="direction-panel">
                <button class="btn-direction" onclick="manualUp()">↑</button>
                <button class="btn-direction" onclick="manualDown()">↓</button>
                <button class="btn-direction" onclick="manualLeft()">←</button>
                <button class="btn-direction" onclick="manualRight()">→</button>
                <button class="btn-reset" onclick="resetGame()">🔄 بداية جديدة</button>
            </div>
        </div>
    </div>

    <!-- لوحة المعلومات -->
    <div class="info-panel">
        <div class="info-header">
            <span>📊 معلومات التحليل</span>
        </div>
        <div class="info-content" id="infoPanel">
            <span class="badge normal">🔵 وضع طبيعي</span>
            <span class="badge depth">⏱️ عمق 0</span>
        </div>
        <div class="hint-text" id="hintText">
            أدخل الأرقام من اللعبة ثم اضغط زر التحليل
        </div>
    </div>
</div>

<script>
// ========== تهيئة اللوحة ==========
const grid = document.getElementById("grid")
for(let i = 0; i < 16; i++)
    grid.innerHTML += `<div class="tile"><input id="t${i}" type="number" min="0" max="20" placeholder="0"></div>`

// ========== متغيرات عامة ==========
let cache = new Map()
let thinking = false
let gameState = {
    maxLevel: 0,
    criticalMode: false,
    reachedLevel15: false,
    movesSinceCritical: 0,
    currentStrategy: "normal",
    lastMove: null
}

// ========== دوال المساعدة ==========
function getBoard() {
    let b = []
    for(let i = 0; i < 4; i++) {
        let r = []
        for(let j = 0; j < 4; j++) {
            let val = parseInt(document.getElementById("t" + (i*4 + j)).value) || 0
            r.push(val)
        }
        b.push(r)
    }
    return b
}

function setBoard(b) {
    for(let i = 0; i < 4; i++)
        for(let j = 0; j < 4; j++)
            document.getElementById("t" + (i*4 + j)).value = b[i][j] || ""
}

function getMaxLevel(b) {
    let max = 0
    for(let i = 0; i < 4; i++)
        for(let j = 0; j < 4; j++)
            if(b[i][j] > max) max = b[i][j]
    return max
}

function calculateTotalScore(b) {
    let score = 0
    for(let i = 0; i < 4; i++)
        for(let j = 0; j < 4; j++)
            if(b[i][j] > 0)
                score += Math.pow(2, b[i][j])
    return score
}

function updateDisplay(b) {
    let maxLevel = getMaxLevel(b)
    let totalScore = calculateTotalScore(b)
    
    document.getElementById("maxLevel").innerText = maxLevel
    document.getElementById("totalScore").innerText = totalScore.toLocaleString()
    
    gameState.maxLevel = maxLevel
    
    // تحديث شكل الشاشة حسب المستوى
    if(maxLevel >= 15 && !gameState.reachedLevel15) {
        gameState.reachedLevel15 = true
        document.getElementById("status").className = "status legend"
        document.getElementById("status").innerText = "👑 15! أسطورة!"
        document.getElementById("mainBtn").className = "btn-primary legend"
        document.getElementById("hintText").innerText = "🔥 مبروك! وصلت للأسطورة! استمر في اللعب"
    }
    else if(maxLevel >= 12 && !gameState.reachedLevel15) {
        document.getElementById("status").className = "status warning"
        document.getElementById("hintText").innerHTML = "🏆 مستوى " + maxLevel + "! باقي خطوات قليلة للأسطورة"
    }
    else if(gameState.criticalMode) {
        document.getElementById("status").className = "status danger"
        document.getElementById("hintText").innerHTML = "⚠️ وضع الطوارئ - ركز على الدمج السريع"
    } else if(maxLevel >= 10) {
        document.getElementById("status").className = "status warning"
        document.getElementById("hintText").innerHTML = "💪 أداء ممتاز! حافظ على الزوايا"
    } else {
        document.getElementById("status").className = "status"
        document.getElementById("hintText").innerHTML = "📝 أدخل الأرقام ثم اضغط تحليل"
    }
}

// ========== دوال اللعبة الأساسية ==========
function compress(row) {
    let n = row.filter(v => v > 0)
    
    for(let i = 0; i < n.length - 1; i++) {
        if(n[i] == n[i + 1] && n[i] > 0) {
            n[i] += 1
            n.splice(i + 1, 1)
        }
    }
    
    while(n.length < 4) n.push(0)
    return n
}

function simulate(b, dir) {
    let old = JSON.stringify(b)
    
    if(dir == "left") {
        for(let i = 0; i < 4; i++) b[i] = compress(b[i])
    }
    else if(dir == "right") {
        for(let i = 0; i < 4; i++) {
            b[i].reverse()
            b[i] = compress(b[i])
            b[i].reverse()
        }
    }
    else if(dir == "up") {
        for(let j = 0; j < 4; j++) {
            let c = [b[0][j], b[1][j], b[2][j], b[3][j]]
            let nc = compress(c)
            for(let i = 0; i < 4; i++) b[i][j] = nc[i]
        }
    }
    else if(dir == "down") {
        for(let j = 0; j < 4; j++) {
            let c = [b[0][j], b[1][j], b[2][j], b[3][j]]
            c.reverse()
            let nc = compress(c)
            nc.reverse()
            for(let i = 0; i < 4; i++) b[i][j] = nc[i]
        }
    }
    
    return old != JSON.stringify(b)
}

function emptyCells(b) {
    let e = []
    for(let i = 0; i < 4; i++)
        for(let j = 0; j < 4; j++)
            if(b[i][j] == 0) e.push([i, j])
    return e
}

function hasAnyMove(b) {
    if(emptyCells(b).length > 0) return true
    
    for(let i = 0; i < 4; i++) {
        for(let j = 0; j < 3; j++) {
            if(b[i][j] == b[i][j+1] && b[i][j] > 0) return true
        }
    }
    
    for(let j = 0; j < 4; j++) {
        for(let i = 0; i < 3; i++) {
            if(b[i][j] == b[i+1][j] && b[i][j] > 0) return true
        }
    }
    
    return false
}

// ========== التقييم المتطور ==========
function evaluate(b, critical = false) {
    let score = 0
    let empty = emptyCells(b).length
    let maxVal = getMaxLevel(b)
    
    if(critical) {
        score += empty * 50000
        
        for(let i = 0; i < 4; i++) {
            for(let j = 0; j < 3; j++) {
                if(b[i][j] == b[i][j + 1] && b[i][j] > 0) {
                    score += b[i][j] * 3000
                }
            }
        }
        for(let j = 0; j < 4; j++) {
            for(let i = 0; i < 3; i++) {
                if(b[i][j] == b[i + 1][j] && b[i][j] > 0) {
                    score += b[i][j] * 3000
                }
            }
        }
    } else {
        score += empty * 15000
        
        if(b[0][0] == maxVal) score += maxVal * 2000
        else if(b[0][3] == maxVal || b[3][0] == maxVal) score += maxVal * 1500
        else if(b[3][3] == maxVal) score += maxVal * 1000
        else score -= maxVal * 500
        
        for(let i = 0; i < 4; i++) {
            for(let j = 0; j < 3; j++) {
                if(b[i][j] == b[i][j + 1] && b[i][j] > 0) {
                    score += b[i][j] * 800
                }
            }
        }
        
        for(let i = 1; i < 3; i++) {
            for(let j = 1; j < 3; j++) {
                score -= b[i][j] * 300
            }
        }
        
        if(maxVal >= 12) score += 100000
        if(maxVal >= 13) score += 200000
        if(maxVal >= 14) score += 500000
        if(maxVal >= 15) score += 1000000
    }
    
    return score
}

// ========== Minimax ==========
function minimax(b, depth, alpha, beta, isMax, critical) {
    if(depth == 0) return evaluate(b, critical)
    
    let key = JSON.stringify(b) + depth + isMax + critical
    if(cache.has(key)) return cache.get(key)
    
    if(isMax) {
        let moves = ["up", "down", "left", "right"]
        let best = -Infinity
        
        for(let m of moves) {
            let sim = JSON.parse(JSON.stringify(b))
            if(!simulate(sim, m)) continue
            
            let val = minimax(sim, depth - 1, alpha, beta, false, critical)
            
            if(val > best) best = val
            alpha = Math.max(alpha, val)
            if(beta <= alpha) break
        }
        
        cache.set(key, best)
        return best
    } else {
        let empty = emptyCells(b)
        if(empty.length == 0) return evaluate(b, critical)
        
        let best = Infinity
        
        for(let [i, j] of empty) {
            for(let val of [1, 2]) {
                let sim = JSON.parse(JSON.stringify(b))
                sim[i][j] = val
                let val2 = minimax(sim, depth - 1, alpha, beta, true, critical)
                best = Math.min(best, val2)
                beta = Math.min(beta, val2)
                if(beta <= alpha) break
            }
        }
        
        cache.set(key, best)
        return best
    }
}

// ========== تحليل الموقف ==========
function analyzeSituation(b) {
    let empty = emptyCells(b).length
    let maxVal = getMaxLevel(b)
    let critical = false
    
    if(maxVal >= 12 && empty <= 4) critical = true
    else if(maxVal >= 10 && empty <= 3) critical = true
    else if(maxVal >= 8 && empty <= 2) critical = true
    else if(empty <= 1) critical = true
    else if(gameState.criticalMode && gameState.movesSinceCritical < 3) {
        critical = true
        gameState.movesSinceCritical++
    } else {
        gameState.criticalMode = false
        gameState.movesSinceCritical = 0
    }
    
    if(critical) {
        gameState.criticalMode = true
        gameState.currentStrategy = "emergency"
    } else {
        gameState.currentStrategy = "normal"
    }
    
    return critical
}

// ========== عرض السهم ==========
function showArrow(move) {
    const arrows = { up: "↑", down: "↓", left: "←", right: "→" }
    let displayArrow = arrows[move] || "⚡"
    
    if(gameState.reachedLevel15) {
        document.getElementById("status").innerText = "👑 " + displayArrow
    } else if(gameState.maxLevel >= 12) {
        document.getElementById("status").innerText = "🏆 " + displayArrow
    } else {
        document.getElementById("status").innerText = displayArrow
    }
}

// ========== التحليل الذكي ==========
function deepThink() {
    if(thinking) return
    
    let b = getBoard()
    
    if(!hasAnyMove(b)) {
        document.getElementById("status").innerText = "💀 انتهت اللعبة!"
        document.getElementById("status").className = "status danger"
        document.getElementById("hintText").innerHTML = "💀 لا توجد حركات ممكنة - اضغط بداية جديدة"
        return
    }
    
    thinking = true
    document.getElementById("status").innerText = "⏳"
    
    setTimeout(() => {
        if(cache.size > 200000) cache.clear()
        
        let b = getBoard()
        let empty = emptyCells(b).length
        let maxVal = getMaxLevel(b)
        
        let criticalMode = analyzeSituation(b)
        
        let depth = criticalMode ? 14 : 
                   (maxVal >= 12 ? 13 :
                   (maxVal >= 10 ? 12 :
                   (maxVal >= 8 ? 11 :
                   (maxVal >= 6 ? 10 :
                   (empty > 8 ? 8 : 9)))))
        
        // تحديث لوحة المعلومات
        let strategyText = criticalMode ? 
            '<span class="badge emergency">🚨 طوارئ</span>' : 
            '<span class="badge normal">🔵 عادي</span>'
        
        document.getElementById("infoPanel").innerHTML = 
            strategyText + ` <span class="badge depth">⏱️ عمق ${depth}</span>`
        
        let moves = ["up", "down", "left", "right"]
        let bestMove = ""
        let bestScore = -Infinity
        
        // تقييم سريع للحركات
        let moveScores = []
        for(let m of moves) {
            let sim = JSON.parse(JSON.stringify(b))
            if(!simulate(sim, m)) continue
            moveScores.push({move: m, score: evaluate(sim, criticalMode)})
        }
        
        moveScores.sort((a, b) => b.score - a.score)
        
        // تحليل عميق لأفضل 3 حركات
        for(let i = 0; i < Math.min(3, moveScores.length); i++) {
            let sim = JSON.parse(JSON.stringify(b))
            simulate(sim, moveScores[i].move)
            let score = minimax(sim, depth - 1, -Infinity, Infinity, false, criticalMode)
            
            if(score > bestScore) {
                bestScore = score
                bestMove = moveScores[i].move
            }
        }
        
        if(bestMove) {
            simulate(b, bestMove)
            setBoard(b)
            updateDisplay(b)
            showArrow(bestMove)
        }
        
        thinking = false
    }, 10)
}

// ========== الحركات اليدوية ==========
function manualUp() { manualMove("up") }
function manualDown() { manualMove("down") }
function manualLeft() { manualMove("left") }
function manualRight() { manualMove("right") }

function manualMove(dir) {
    if(thinking) return
    let b = getBoard()
    if(simulate(b, dir)) {
        setBoard(b)
        updateDisplay(b)
        showArrow(dir)
    }
}

// ========== إعادة التعيين ==========
function resetGame() {
    if(thinking) return
    
    for(let i = 0; i < 16; i++)
        document.getElementById("t" + i).value = ""
    
    gameState = {
        maxLevel: 0,
        criticalMode: false,
        reachedLevel15: false,
        movesSinceCritical: 0,
        currentStrategy: "normal"
    }
    
    document.getElementById("status").className = "status"
    document.getElementById("status").innerText = "⚡"
    document.getElementById("mainBtn").className = "btn-primary"
    document.getElementById("maxLevel").innerText = "0"
    document.getElementById("totalScore").innerText = "0"
    document.getElementById("infoPanel").innerHTML = 
        '<span class="badge normal">🔵 وضع طبيعي</span> <span class="badge depth">⏱️ عمق 0</span>'
    document.getElementById("hintText").innerHTML = "📝 أدخل الأرقام ثم اضغط تحليل"
    
    cache.clear()
}

// ========== بداية التشغيل ==========
window.onload = resetGame
</script
