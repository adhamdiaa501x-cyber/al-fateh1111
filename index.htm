<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QDS DATABASE - نظام التحليل بقاعدة بيانات</title>
    
    <meta name="description" content="أقوى نظام لتحليل ودمج الوحوش مع قاعدة بيانات متكاملة">
    <meta name="author" content="Al FaTeh">
    
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='10' y='80' font-size='80' fill='%2300f2ff'%3E⚡%3C/text%3E%3C/svg%3E">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        :root {
            --primary: #00f2ff;
            --primary-dark: #0088cc;
            --secondary: #ffd700;
            --danger: #ff4444;
            --success: #00ff88;
            --legend: #aa88ff;
            --save: #2a5f2a;
            --load: #5f2a5f;
            --stats: #2a2a5f;
            
            --bg-dark: #0a0a0f;
            --bg-panel: #111116;
            --bg-card: #1a1a24;
            
            --text: #ffffff;
            --text-dim: #aaaac0;
            --border: #2a2a35;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        /* الهيدر */
        .header {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .brand {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 30px var(--primary);
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
        }

        .brand::after {
            content: 'DB';
            font-size: 0.9rem;
            background: var(--secondary);
            color: black;
            padding: 4px 12px;
            border-radius: 30px;
            position: absolute;
            top: 0;
            left: -40px;
            font-weight: bold;
        }

        .credit {
            display: flex;
            justify-content: center;
            gap: 20px;
            color: var(--text-dim);
            flex-wrap: wrap;
        }

        /* شاشة الحالة */
        .status-container {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .status {
            font-size: 4rem;
            text-align: center;
            padding: 20px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 20px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .status.warning {
            border-color: var(--secondary);
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }

        .status.danger {
            border-color: var(--danger);
            box-shadow: 0 0 30px rgba(255,68,68,0.3);
        }

        .status.legend {
            border-color: var(--legend);
            box-shadow: 0 0 50px rgba(170,136,255,0.5);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-value.max {
            color: var(--secondary);
        }

        /* اللوحة */
        .game-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .tile {
            aspect-ratio: 1;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 15px;
            transition: 0.3s;
        }

        .tile input {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 1.8rem;
            text-align: center;
            font-weight: bold;
            outline: none;
        }

        /* ألوان الأرقام */
        .tile input[value="1"] { color: #88ccff; }
        .tile input[value="2"] { color: #88ff88; }
        .tile input[value="3"] { color: #ffff88; }
        .tile input[value="4"] { color: #ffaa88; }
        .tile input[value="5"] { color: #ff8888; }
        .tile input[value="6"] { color: #ff88ff; }
        .tile input[value="7"] { color: #ddaaff; }
        .tile input[value="8"] { color: #aaccff; text-shadow: 0 0 10px blue; }
        .tile input[value="9"] { color: #ffaa00; text-shadow: 0 0 10px orange; }
        .tile input[value="10"] { color: #ff5500; text-shadow: 0 0 20px red; }
        .tile input[value="11"] { color: #ff00ff; text-shadow: 0 0 20px magenta; }
        .tile input[value="12"] { color: #ffdd00; text-shadow: 0 0 20px gold; }
        .tile input[value="13"] { color: #ffaa88; text-shadow: 0 0 20px #ff5500; font-size: 2rem; }
        .tile input[value="14"] { color: #ff8888; text-shadow: 0 0 30px red; font-size: 2rem; }
        .tile input[value="15"] { color: white; text-shadow: 0 0 40px white; font-size: 2.2rem; }

        /* الأزرار */
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #00a2ff, #00f2ff);
            border: none;
            padding: 20px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            color: black;
            cursor: pointer;
            box-shadow: 0 5px 0 #0088cc;
            transition: 0.1s;
            margin-bottom: 15px;
        }

        .btn-primary:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        .btn-primary.legend {
            background: linear-gradient(135deg, #aa88ff, #cc88ff);
            box-shadow: 0 5px 0 #8866cc;
        }

        .direction-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn-dir {
            background: var(--bg-card);
            border: 2px solid var(--border);
            padding: 15px;
            border-radius: 30px;
            font-size: 2rem;
            color: var(--primary);
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-dir:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        /* أزرار قاعدة البيانات */
        .db-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .btn-db {
            background: var(--bg-card);
            border: 2px solid var(--border);
            padding: 12px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-db.save {
            background: var(--save);
            border-color: #4caf50;
        }

        .btn-db.load {
            background: var(--load);
            border-color: #aa88ff;
        }

        .btn-db.stats {
            background: var(--stats);
            border-color: var(--primary);
        }

        .btn-db:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .btn-reset {
            width: 100%;
            background: var(--bg-card);
            border: 2px solid var(--danger);
            padding: 15px;
            border-radius: 30px;
            font-size: 1.3rem;
            color: var(--danger);
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-reset:hover {
            background: var(--danger);
            color: white;
        }

        /* لوحة المعلومات */
        .info-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 20px;
        }

        .info-header {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: bold;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
        }

        .badge.emergency {
            background: rgba(255,68,68,0.2);
            color: var(--danger);
            border-color: var(--danger);
        }

        .badge.normal {
            background: rgba(0,242,255,0.2);
            color: var(--primary);
            border-color: var(--primary);
        }

        .badge.depth {
            background: rgba(255,215,0,0.2);
            color: var(--secondary);
            border-color: var(--secondary);
        }

        .badge.db {
            background: rgba(170,136,255,0.2);
            color: var(--legend);
            border-color: var(--legend);
        }

        .hint {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.6;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            border-right: 3px solid var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- الهيدر -->
    <div class="header">
        <h1 class="brand">QDS</h1>
        <div class="credit">
            <span>👤 Al FaTeh</span>
            <span>📱 01016057623</span>
            <span>🎯 32768</span>
        </div>
    </div>

    <!-- الحالة -->
    <div class="status-container">
        <div id="status" class="status">⚡</div>
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">المستوى</div>
                <div class="stat-value max" id="maxLevel">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">النقاط</div>
                <div class="stat-value" id="totalScore">0</div>
            </div>
        </div>
    </div>

    <!-- اللوحة -->
    <div class="game-panel">
        <div id="grid" class="grid"></div>

        <button class="btn-primary" id="mainBtn" onclick="deepThink()">
            ⚡ تحليل ذكي (عمق 14)
        </button>

        <div class="direction-grid">
            <button class="btn-dir" onclick="manualUp()">↑</button>
            <button class="btn-dir" onclick="manualDown()">↓</button>
            <button class="btn-dir" onclick="manualLeft()">←</button>
            <button class="btn-dir" onclick="manualRight()">→</button>
        </div>

        <!-- أزرار قاعدة البيانات -->
        <div class="db-grid">
            <button class="btn-db save" onclick="showSaveDialog()">💾 حفظ</button>
            <button class="btn-db load" onclick="showLoadDialog()">📂 تحميل</button>
            <button class="btn-db stats" onclick="QDSDatabase.showStats()">📊 إحصائيات</button>
        </div>

        <button class="btn-reset" onclick="resetGame()">🔄 بداية جديدة</button>
    </div>

    <!-- المعلومات -->
    <div class="info-panel">
        <div class="info-header" id="infoPanel">
            <span class="badge normal">🔵 وضع طبيعي</span>
            <span class="badge depth">⏱️ عمق 0</span>
            <span class="badge db">💾 DB</span>
        </div>
        <div class="hint" id="hintText">
            أدخل الأرقام من اللعبة ثم اضغط تحليل
        </div>
    </div>
</div>

<script>
// ========== تهيئة اللوحة ==========
const grid = document.getElementById("grid")
for(let i = 0; i < 16; i++)
    grid.innerHTML += `<div class="tile"><input id="t${i}" type="number" min="0" max="20" placeholder="0"></div>`

// ========== المتغيرات العامة ==========
let cache = new Map()
let thinking = false
let gameState = {
    maxLevel: 0,
    criticalMode: false,
    reachedLevel15: false,
    movesSinceCritical: 0
}

// ========== نظام قاعدة البيانات المتكامل ==========
const QDSDatabase = {
    // تهيئة قاعدة البيانات
    init: function() {
        if(!localStorage.getItem('qds_stats')) {
            localStorage.setItem('qds_stats', JSON.stringify({
                gamesPlayed: 0,
                highestLevel: 0,
                totalScore: 0,
                wins: 0,
                bestMove: null
            }))
        }
        if(!localStorage.getItem('qds_games')) {
            localStorage.setItem('qds_games', JSON.stringify([]))
        }
        if(!localStorage.getItem('qds_history')) {
            localStorage.setItem('qds_history', JSON.stringify([]))
        }
    },
    
    // تحديث الإحصائيات
    updateStats: function(maxLevel, score) {
        let stats = JSON.parse(localStorage.getItem('qds_stats'))
        stats.gamesPlayed++
        stats.highestLevel = Math.max(stats.highestLevel, maxLevel)
        stats.totalScore += score
        if(maxLevel >= 15) stats.wins++
        localStorage.setItem('qds_stats', JSON.stringify(stats))
        this.addToHistory(maxLevel, score)
    },
    
    // إضافة سجل
    addToHistory: function(maxLevel, score) {
        let history = JSON.parse(localStorage.getItem('qds_history'))
        history.push({
            date: new Date().toLocaleString(),
            level: maxLevel,
            score: score
        })
        if(history.length > 20) history.shift()
        localStorage.setItem('qds_history', JSON.stringify(history))
    },
    
    // حفظ لعبة
    saveGame: function(name, board, maxLevel, score) {
        let games = JSON.parse(localStorage.getItem('qds_games'))
        games.push({
            id: Date.now(),
            name: name,
            board: JSON.parse(JSON.stringify(board)),
            maxLevel: maxLevel,
            score: score,
            date: new Date().toLocaleString()
        })
        localStorage.setItem('qds_games', JSON.stringify(games))
        this.showNotification('✅ تم الحفظ', 'success')
    },
    
    // جلب كل الألعاب
    getAllGames: function() {
        return JSON.parse(localStorage.getItem('qds_games'))
    },
    
    // تحميل لعبة
    loadGame: function(id) {
        let games = this.getAllGames()
        let game = games.find(g => g.id === id)
        if(game) {
            setBoard(game.board)
            updateDisplay(game.board)
            this.showNotification(`📂 تم تحميل: ${game.name}`, 'info')
            return true
        }
        return false
    },
    
    // حذف لعبة
    deleteGame: function(id) {
        let games = this.getAllGames()
        games = games.filter(g => g.id !== id)
        localStorage.setItem('qds_games', JSON.stringify(games))
    },
    
    // حفظ أفضل حركة
    saveBestMove: function(board, move, score) {
        let stats = JSON.parse(localStorage.getItem('qds_stats'))
        if(!stats.bestMove || score > stats.bestMove.score) {
            stats.bestMove = {
                board: board,
                move: move,
                score: score,
                date: new Date().toLocaleString()
            }
            localStorage.setItem('qds_stats', JSON.stringify(stats))
        }
    },
    
    // عرض الإحصائيات
    showStats: function() {
        let stats = JSON.parse(localStorage.getItem('qds_stats'))
        let history = JSON.parse(localStorage.getItem('qds_history'))
        let games = this.getAllGames()
        
        let msg = `📊 **إحصائياتك الشاملة**\n\n`
        msg += `🎮 الألعاب التي لعبتها: ${stats.gamesPlayed}\n`
        msg += `🏆 أعلى مستوى وصلت له: ${stats.highestLevel}\n`
        msg += `💰 إجمالي النقاط: ${stats.totalScore.toLocaleString()}\n`
        msg += `👑 مرات الفوز (15): ${stats.wins}\n`
        msg += `💾 ألعاب محفوظة: ${games.length}\n\n`
        
        if(stats.bestMove) {
            msg += `⭐ أفضل حركة: ${stats.bestMove.move}\n`
            msg += `📅 ${stats.bestMove.date}\n\n`
        }
        
        msg += `📋 **آخر 5 ألعاب:**\n`
        let recent = history.slice(-5).reverse()
        recent.forEach((h, i) => {
            msg += `${i+1}. مستوى ${h.level} | ${h.score.toLocaleString()} نقطة\n`
        })
        
        alert(msg)
    },
    
    // تصدير البيانات
    exportData: function() {
        let data = {
            stats: JSON.parse(localStorage.getItem('qds_stats')),
            games: JSON.parse(localStorage.getItem('qds_games')),
            history: JSON.parse(localStorage.getItem('qds_history')),
            exportDate: new Date().toLocaleString()
        }
        
        let blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'})
        let url = URL.createObjectURL(blob)
        let a = document.createElement('a')
        a.href = url
        a.download = `qds_backup_${Date.now()}.json`
        a.click()
        
        this.showNotification('📤 تم التصدير بنجاح', 'success')
    },
    
    // استيراد البيانات
    importData: function(jsonData) {
        try {
            let data = JSON.parse(jsonData)
            localStorage.setItem('qds_stats', JSON.stringify(data.stats))
            localStorage.setItem('qds_games', JSON.stringify(data.games))
            localStorage.setItem('qds_history', JSON.stringify(data.history))
            this.showNotification('📥 تم الاستيراد بنجاح', 'success')
            return true
        } catch(e) {
            this.showNotification('❌ فشل الاستيراد', 'error')
            return false
        }
    },
    
    // مسح كل البيانات
    clearAll: function() {
        if(confirm('⚠️ هل أنت متأكد من مسح كل البيانات؟')) {
            localStorage.removeItem('qds_stats')
            localStorage.removeItem('qds_games')
            localStorage.removeItem('qds_history')
            this.init()
            this.showNotification('🗑️ تم مسح البيانات', 'info')
        }
    },
    
    // إشعار
    showNotification: function(msg, type) {
        document.getElementById("hintText").innerHTML = msg
        setTimeout(() => {
            document.getElementById("hintText").innerHTML = "📝 أدخل الأرقام ثم اضغط تحليل"
        }, 2000)
    }
}

// ========== دوال الحفظ والتحميل ==========
function showSaveDialog() {
    let name = prompt("📝 أدخل اسم للحفظ:", "لعبة " + new Date().toLocaleString())
    if(!name) return
    
    let b = getBoard()
    let maxLevel = getMaxLevel(b)
    let score = calculateScore(b)
    
    QDSDatabase.saveGame(name, b, maxLevel, score)
    updateDatabaseBadge()
}

function showLoadDialog() {
    let games = QDSDatabase.getAllGames()
    if(games.length === 0) {
        alert("📭 لا توجد ألعاب محفوظة")
        return
    }
    
    // عرض الألعاب بشكل منظم
    let msg = "📂 **الألعاب المحفوظة:**\n\n"
    games.forEach((g, i) => {
        msg += `${i+1}. ${g.name}\n   مستوى ${g.maxLevel} | ${g.score.toLocaleString()} نقطة\n   📅 ${g.date}\n\n`
    })
    
    let choice = prompt(msg + "أدخل رقم اللعبة للتحميل (أو 'تصدير' لتصدير البيانات):")
    if(!choice) return
    
    if(choice.toLowerCase() === 'تصدير') {
        QDSDatabase.exportData()
        return
    }
    
    let index = parseInt(choice) - 1
    if(index >= 0 && index < games.length) {
        QDSDatabase.loadGame(games[index].id)
    }
}

function updateDatabaseBadge() {
    let games = QDSDatabase.getAllGames()
    document.getElementById("infoPanel").innerHTML = 
        `<span class="badge normal">🔵 ${gameState.criticalMode ? 'طوارئ' : 'عادي'}</span> ` +
        `<span class="badge depth">⏱️ عمق ${getCurrentDepth()}</span> ` +
        `<span class="badge db">💾 ${games.length}</span>`
}

function getCurrentDepth() {
    let b = getBoard()
    let maxVal = getMaxLevel(b)
    if(gameState.criticalMode) return 14
    if(maxVal >= 12) return 13
    if(maxVal >= 10) return 12
    if(maxVal >= 8) return 11
    if(maxVal >= 6) return 10
    return 9
}

// ========== دوال المساعدة ==========
function getBoard() {
    let b = []
    for(let i = 0; i < 4; i++) {
        let r = []
        for(let j = 0; j < 4; j++) {
            let val = parseInt(document.getElementById("t" + (i*4 + j)).value) || 0
            r.push(val)
        }
        b.push(r)
    }
    return b
}

function setBoard(b) {
    for(let i = 0; i < 4; i++)
        for(let j = 0; j < 4; j++)
            document.getElementById("t" + (i*4 + j)).value = b[i][j] || ""
}

function getMaxLevel(b) {
    let max = 0
    for(let i = 0; i < 4; i++)
        for(let j = 0; j < 4; j++)
            if(b[i][j] > max) max = b[i][j]
    return max
}

function calculateScore(b) {
    let score = 0
    for(let i = 0; i < 4; i++)
        for(let j = 0; j < 4; j++)
            if(b[i][j] > 0)
                score += Math.pow(2, b[i][j])
    return score
}

function updateDisplay(b) {
    let maxLevel = getMaxLevel(b)
    let totalScore = calculateScore(b)
    
    document.getElementById("maxLevel").innerText = maxLevel
    document.getElementById("totalScore").innerText = totalScore.toLocaleString()
    
    gameState.maxLevel = maxLevel
    
    if(maxLevel >= 15 && !gameState.reachedLevel15) {
        gameState.reachedLevel15 = true
        document.getElementById("status").className = "status legend"
        document.getElementById("status").innerText = "👑 15!"
        document.getElementById("mainBtn").className = "btn-primary legend"
    }
    else if(maxLevel >= 12) {
        document.getElementById("status").className = "status warning"
    }
    else if(gameState.criticalMode) {
        document.getElementById("status").className = "status danger"
    }
    else {
        document.getElementById("status").className = "status"
    }
    
    updateDatabaseBadge()
}

function compress(row) {
    let n = row.filter(v => v > 0)
    
    for(let i = 0; i < n.length - 1; i++) {
        if(n[i] == n[i + 1] && n[i] > 0) {
            n[i] += 1
            n.splice(i + 1, 1)
        }
    }
    
    while(n.length < 4) n.push(0)
    return n
}

function simulate(b, dir) {
    let old = JSON.stringify(b)
    
    if(dir == "left") {
        for(let i = 0; i < 4; i++) b[i] = compress(b[i])
    }
    else if(dir == "right") {
        for(let i = 0; i < 4; i++) {
            b[i].reverse()
            b[i] = compress(b[i])
            b[i].reverse()
        }
    }
    else if(dir == "up") {
        for(let j = 0; j < 4; j++) {
            let c = [b[0][j], b[1][j], b[2][j], b[3][j]]
            let nc = compress(c)
            for(let i = 0; i < 4; i++) b[i][j] = nc[i]
        }
    }
    else if(dir == "down") {
        for(let j = 0; j < 4; j++) {
            let c = [b[0][j], b[1][j], b[2][j], b[3][j]]
            c.reverse()
            let nc = compress(c)
            nc.reverse()
            for(let i = 0; i < 4; i++) b[i][j] = nc[i]
        }
    }
    
    return old != JSON.stringify(b)
}

function emptyCells(b) {
    let e = []
    for(let i = 0; i < 4; i++)
        for(let j = 0; j < 4; j++)
            if(b[i][j] == 0) e.push([i, j])
    return e
}

function hasAvailableMoves(b) {
    let empty = emptyCells(b).length
    if(empty > 0) return true
    
    for(let i = 0; i < 4; i++) {
        for(let j = 0; j < 3; j++) {
            if(b[i][j] == b[i][j+1] && b[i][j] > 0) return true
        }
    }
    
    for(let j = 0; j < 4; j++) {
        for(let i = 0; i < 3; i++) {
            if(b[i][j] == b[i+1][j] && b[i][j] > 0) return true
        }
    }
    
    return false
}

function evaluate(b, critical = false) {
    let score = 0
    let empty = emptyCells(b).length
    let maxVal = getMaxLevel(b)
    
    if(critical) {
        score += empty * 50000
        
        for(let i = 0; i < 4; i++) {
            for(let j = 0; j < 3; j++) {
                if(b[i][j] == b[i][j+1] && b[i][j] > 0)
                    score += b[i][j] * 3000
            }
        }
        for(let j = 0; j < 4; j++) {
            for(let i = 0; i < 3; i++) {
                if(b[i][j] == b[i+1][j] && b[i][j] > 0)
                    score += b[i][j] * 3000
            }
        }
    } else {
        score += empty * 15000
        
        if(b[0][0] == maxVal) score += maxVal * 2000
        else if(b[0][3] == maxVal || b[3][0] == maxVal) score += maxVal * 1500
        else if(b[3][3] == maxVal) score += maxVal * 1000
        else score -= maxVal * 500
        
        for(let i = 0; i < 4; i++) {
            for(let j = 0; j < 3; j++) {
                if(b[i][j] == b[i][j+1] && b[i][j] > 0)
                    score += b[i][j] * 800
            }
        }
        
        for(let i = 1; i < 3; i++) {
            for(let j = 1; j < 3; j++) {
                score -= b[i][j] * 300
            }
        }
        
        if(maxVal >= 12) score += 100000
        if(maxVal >= 13) score += 200000
        if(maxVal >= 14) score += 500000
        if(maxVal >= 15) score += 1000000
    }
    
    return score
}

function minimax(b, depth, alpha, beta, isMax, critical) {
    if(depth == 0) return evaluate(b, critical)
    
    let key = JSON.stringify(b) + depth + isMax + critical
    if(cache.has(key)) return cache.get(key)
    
    if(isMax) {
        let moves = ["up", "down", "left", "right"]
        let best = -Infinity
        
        for(let m of moves) {
            let sim = JSON.parse(JSON.stringify(b))
            if(!simulate(sim, m)) continue
            
            let val = minimax(sim, depth - 1, alpha, beta, false, critical)
            best = Math.max(best, val)
            alpha = Math.max(alpha, val)
            if(beta <= alpha) break
        }
        
        cache.set(key, best)
        return best
    } else {
        let empty = emptyCells(b)
        if(empty.length == 0) return evaluate(b, critical)
        
        let best = Infinity
        
        for(let [i, j] of empty) {
            for(let val of [1, 2]) {
                let sim = JSON.parse(JSON.stringify(b))
                sim[i][j] = val
                let val2 = minimax(sim, depth - 1, alpha, beta, true, critical)
                best = Math.min(best, val2)
                beta = Math.min(beta, val2)
                if(beta <= alpha) break
            }
        }
        
        cache.set(key, best)
        return best
    }
}

function analyzeSituation(b) {
    let empty = emptyCells(b).length
    let maxVal = getMaxLevel(b)
    
    if(maxVal >= 12 && empty <= 4) return true
    if(maxVal >= 10 && empty <= 3) return true
    if(maxVal >= 8 && empty <= 2) return true
    if(empty <= 1) return true
    if(gameState.criticalMode && gameState.movesSinceCritical < 3) {
        gameState.movesSinceCritical++
        return true
    }
    
    gameState.criticalMode = false
    gameState.movesSinceCritical = 0
    return false
}

    let arrow = arrows[move] || "⚡"

    else if(gameState.maxLevel >= 12) arrow = "🏆 " + arrow
    
    document.getElementById("status").innerText = arrow
}
