<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QDS ULTRA - الذكاء الأسطوري</title>

<style>
:root{
--bg:#050505;
--accent:#00f2ff;
--panel:#111;
--gold:#ffd700;
--danger:#ff4444;
--legend:#aa88ff;
}

body{
background:var(--bg);
color:#fff;
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
margin:0;
padding:15px;
text-align:center;
background:linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
}

.container{
max-width:420px;
margin:auto;
}

.brand{
font-size:3rem;
font-weight:900;
color:var(--accent);
text-shadow:0 0 30px var(--accent), 0 0 60px #0088ff;
margin-bottom:5px;
letter-spacing:2px;
}

.credit{
margin-top:5px;
font-size:1rem;
color:#aaa;
background:rgba(0,242,255,0.1);
padding:8px 15px;
border-radius:30px;
display:inline-block;
}

.status{
background:var(--panel);
border:3px solid var(--accent);
border-radius:15px;
padding:20px;
margin:15px 0;
font-size:2.5rem;
color:var(--accent);
box-shadow:0 0 30px rgba(0,242,255,0.3);
transition:0.3s;
}

.status.warning{
border-color:var(--gold);
color:var(--gold);
box-shadow:0 0 30px rgba(255,215,0,0.3);
}

.status.danger{
border-color:var(--danger);
color:var(--danger);
box-shadow:0 0 30px rgba(255,68,68,0.3);
}

.status.legend{
border-color:#aa88ff;
color:#aa88ff;
box-shadow:0 0 50px #aa88ff;
}

.score-board{
display:flex;
justify-content:space-between;
margin:15px 0;
gap:10px;
}

.score-box{
background:var(--panel);
border:2px solid var(--accent);
border-radius:12px;
padding:12px;
flex:1;
font-size:1.1rem;
}

.score-box span{
display:block;
font-size:1.8rem;
font-weight:bold;
color:var(--accent);
}

.max-level{
border-color:var(--gold);
}

.max-level span{
color:var(--gold);
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
background:#222;
padding:15px;
border-radius:20px;
border:2px solid #333;
box-shadow:inset 0 0 30px #000;
}

.tile{
aspect-ratio:1;
background:#000;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
border:2px solid #333;
transition:0.2s;
}

.tile input{
width:100%;
height:100%;
border:none;
background:transparent;
color:var(--accent);
font-size:1.8rem;
text-align:center;
outline:none;
font-weight:bold;
}

/* تلوين حسب المستوى */
.tile input[value="1"] { color: #88ccff; }
.tile input[value="2"] { color: #88ff88; }
.tile input[value="3"] { color: #ffff88; }
.tile input[value="4"] { color: #ffaa88; }
.tile input[value="5"] { color: #ff8888; }
.tile input[value="6"] { color: #ff88ff; }
.tile input[value="7"] { color: #ddaaff; }
.tile input[value="8"] { color: #aaccff; text-shadow:0 0 10px blue; }
.tile input[value="9"] { color: #ffaa00; text-shadow:0 0 10px orange; }
.tile input[value="10"] { color: #ff5500; text-shadow:0 0 20px red; }
.tile input[value="11"] { color: #ff00ff; text-shadow:0 0 20px magenta; }
.tile input[value="12"] { color: #ffdd00; text-shadow:0 0 20px gold; }
.tile input[value="13"] { color: #ffaa88; text-shadow:0 0 20px #ff8800; font-size:2rem; }
.tile input[value="14"] { color: #ff8888; text-shadow:0 0 30px #ff4444; font-size:2rem; }
.tile input[value="15"] { color: #ffdddd; text-shadow:0 0 40px #ffffff; font-size:2.2rem; font-weight:900; }

.btn{
background:linear-gradient(135deg, #00a2ff, #00f2ff);
border:none;
padding:18px;
border-radius:12px;
font-size:1.3rem;
font-weight:900;
cursor:pointer;
width:100%;
margin-top:15px;
color:#000;
box-shadow:0 5px 0 #0088cc, 0 10px 20px black;
transition:0.1s;
}

.btn:active{
transform:translateY(5px);
box-shadow:0 2px 0 #0088cc, 0 10px 20px black;
}

.btn.legend{
background:linear-gradient(135deg, #aa88ff, #cc88ff);
box-shadow:0 5px 0 #8866cc;
}

.info-panel{
background:rgba(0,0,0,0.7);
border:1px solid #333;
border-radius:10px;
padding:10px;
margin:10px 0;
font-size:0.9rem;
color:#aaa;
text-align:right;
}

.depth-indicator{
display:inline-block;
padding:2px 8px;
border-radius:12px;
background:#333;
color:#fff;
font-size:0.8rem;
margin-right:5px;
}

.strategy-badge{
display:inline-block;
padding:3px 8px;
border-radius:15px;
font-size:0.8rem;
margin-right:5px;
}

.normal-strategy{
background:rgba(0,255,255,0.2);
color:#00ffff;
}

.emergency-strategy{
background:rgba(255,68,68,0.2);
color:#ff8888;
}

</style>
</head>

<body>

<div class="container">

<h1 class="brand">QDS ULTRA</h1>

<div class="credit">
Al FaTeh · 01016057623 · هدف 32768
</div>

<div id="status" class="status">⚡</div>

<div class="score-board">
    <div class="score-box">
        <div>المجموع</div>
        <span id="totalScore">0</span>
    </div>
    <div class="score-box max-level">
        <div>المستوى</div>
        <span id="maxLevel">0</span>
    </div>
</div>

<div id="grid" class="grid"></div>

<button class="btn" id="mainBtn" onclick="deepThink()">⚡ تحليل فائق</button>

<div class="info-panel" id="infoPanel">
    <span id="strategyText">🔄 جاري التحليل...</span>
</div>

</div>

<script>
const grid = document.getElementById("grid")

// إنشاء الخانات
for(let i = 0; i < 16; i++)
    grid.innerHTML += `<div class="tile"><input id="t${i}" type="number" min="0" max="20" placeholder="0"></div>`

let cache = new Map()
let thinking = false
let gameState = {
    maxLevel: 0,
    criticalMode: false,
    reachedLevel15: false,
    movesSinceCritical: 0,
    currentStrategy: "normal"
}

function getBoard() {
    let b = []
    for(let i = 0; i < 4; i++) {
        let r = []
        for(let j = 0; j < 4; j++) {
            let val = parseInt(document.getElementById("t" + (i*4 + j)).value) || 0
            r.push(val)
        }
        b.push(r)
    }
    return b
}

function setBoard(b) {
    for(let i = 0; i < 4; i++)
        for(let j = 0; j < 4; j++)
            document.getElementById("t" + (i*4 + j)).value = b[i][j] || ""
}

function getMaxLevel(b) {
    let max = 0
    for(let i = 0; i < 4; i++)
        for(let j = 0; j < 4; j++)
            if(b[i][j] > max) max = b[i][j]
    return max
}

function calculateTotalScore(b) {
    let score = 0
    for(let i = 0; i < 4; i++)
        for(let j = 0; j < 4; j++)
            if(b[i][j] > 0)
                score += Math.pow(2, b[i][j])
    return score
}

function updateDisplay(b) {
    let maxLevel = getMaxLevel(b)
    let totalScore = calculateTotalScore(b)
    
    document.getElementById("maxLevel").innerText = maxLevel
    document.getElementById("totalScore").innerText = totalScore.toLocaleString()
    
    gameState.maxLevel = maxLevel
    
    if(maxLevel >= 15 && !gameState.reachedLevel15) {
        gameState.reachedLevel15 = true
        document.getElementById("status").className = "status legend"
        document.getElementById("status").innerText = "👑 15! أسطورة!"
        document.getElementById("mainBtn").className = "btn legend"
    }
    else if(maxLevel >= 12 && !gameState.reachedLevel15) {
        document.getElementById("status").className = "status victory"
        document.getElementById("status").innerText = "🏆 " + maxLevel + "! استمر"
    }
    else if(gameState.criticalMode) {
        document.getElementById("status").className = "status danger"
    } else if(maxLevel >= 10) {
        document.getElementById("status").className = "status warning"
    } else {
        document.getElementById("status").className = "status"
    }
}

function compress(row) {
    let n = row.filter(v => v > 0)
    
    for(let i = 0; i < n.length - 1; i++) {
        if(n[i] == n[i + 1] && n[i] > 0) {
            n[i] += 1
            n.splice(i + 1, 1)
        }
    }
    
    while(n.length < 4) n.push(0)
    return n
}

function simulate(b, dir) {
    let old = JSON.stringify(b)
    
    if(dir == "left") {
        for(let i = 0; i < 4; i++) b[i] = compress(b[i])
    }
    else if(dir == "right") {
        for(let i = 0; i < 4; i++) {
            b[i].reverse()
            b[i] = compress(b[i])
            b[i].reverse()
        }
    }
    else if(dir == "up") {
        for(let j = 0; j < 4; j++) {
            let c = [b[0][j], b[1][j], b[2][j], b[3][j]]
            let nc = compress(c)
            for(let i = 0; i < 4; i++) b[i][j] = nc[i]
        }
    }
    else if(dir == "down") {
        for(let j = 0; j < 4; j++) {
            let c = [b[0][j], b[1][j], b[2][j], b[3][j]]
            c.reverse()
            let nc = compress(c)
            nc.reverse()
            for(let i = 0; i < 4; i++) b[i][j] = nc[i]
        }
    }
    
    return old != JSON.stringify(b)
}

function emptyCells(b) {
    let e = []
    for(let i = 0; i < 4; i++)
        for(let j = 0; j < 4; j++)
            if(b[i][j] == 0) e.push([i, j])
    return e
}

// التحقق من وجود حركة ممكنة
function hasAnyMove(b) {
    // لو في خلايا فارغة، أكيد في حركة
    if(emptyCells(b).length > 0) return true
    
    // فحص الدمج الأفقي
    for(let i = 0; i < 4; i++) {
        for(let j = 0; j < 3; j++) {
            if(b[i][j] == b[i][j+1] && b[i][j] > 0) {
                return true
            }
        }
    }
    
    // فحص الدمج العمودي
    for(let j = 0; j < 4; j++) {
        for(let i = 0; i < 3; i++) {
            if(b[i][j] == b[i+1][j] && b[i][j] > 0) {
                return true
            }
        }
    }
    
    return false
}

// تقييم الوضع
function evaluate(b, critical = false) {
    let score = 0
    let empty = emptyCells(b).length
    let maxVal = getMaxLevel(b)
    
    if(critical) {
        // استراتيجية الطوارئ
        score += empty * 50000
        
        for(let i = 0; i < 4; i++) {
            for(let j = 0; j < 3; j++) {
                if(b[i][j] == b[i][j + 1] && b[i][j] > 0) {
                    score += b[i][j] * 3000
                }
            }
        }
        for(let j = 0; j < 4; j++) {
            for(let i = 0; i < 3; i++) {
                if(b[i][j] == b[i + 1][j] && b[i][j] > 0) {
                    score += b[i][j] * 3000
                }
            }
        }
        
        score += empty * 20000
    } else {
        // الاستراتيجية العادية
        score += empty * 15000
        
        if(b[0][0] == maxVal) score += maxVal * 2000
        else if(b[0][3] == maxVal || b[3][0] == maxVal) score += maxVal * 1500
        else if(b[3][3] == maxVal) score += maxVal * 1000
        else score -= maxVal * 500
        
        for(let i = 0; i < 4; i++) {
            for(let j = 0; j < 3; j++) {
                if(b[i][j] == b[i][j + 1] && b[i][j] > 0) {
                    score += b[i][j] * 800
                }
            }
        }
        for(let j = 0; j < 4; j++) {
            for(let i = 0; i < 3; i++) {
                if(b[i][j] == b[i + 1][j] && b[i][j] > 0) {
                    score += b[i][j] * 800
                }
            }
        }
        
        for(let i = 1; i < 3; i++) {
            for(let j = 1; j < 3; j++) {
                score -= b[i][j] * 300
            }
        }
        
        if(maxVal >= 12) score += 100000
        if(maxVal >= 13) score += 200000
        if(maxVal >= 14) score += 500000
        if(maxVal >= 15) score += 1000000
    }
    
    return score
}

// Minimax
function minimax(b, depth, alpha, beta, isMax, critical) {
    if(depth == 0) return evaluate(b, critical)
    
    let key = JSON.stringify(b) + depth + isMax + critical
    if(cache.has(key)) return cache.get(key)
    
    if(isMax) {
        let moves = ["up", "down", "left", "right"]
        let best = -Infinity
        
        for(let m of moves) {
            let sim = JSON.parse(JSON.stringify(b))
            if(!simulate(sim, m)) continue
            
            let val = minimax(sim, depth - 1, alpha, beta, false, critical)
            
            if(val > best) best = val
            alpha = Math.max(alpha, val)
            if(beta <= alpha) break
        }
        
        cache.set(key, best)
        return best
    } else {
        let empty = emptyCells(b)
        if(empty.length == 0) return evaluate(b, critical)
        
        let best = Infinity
        
        for(let [i, j] of empty) {
            for(let val of [1, 2]) {
                let sim = JSON.parse(JSON.stringify(b))
                sim[i][j] = val
                let val2 = minimax(sim, depth - 1, alpha, beta, true, critical)
                best = Math.min(best, val2)
                beta = Math.min(beta, val2)
                if(beta <= alpha) break
            }
        }
        
        cache.set(key, best)
        return best
    }
}

// تحليل الموقف
function analyzeSituation(b) {
    let empty = emptyCells(b).length
    let maxVal = getMaxLevel(b)
    let critical = false
    let reason = ""
    
    if(maxVal >= 12 && empty <= 4) {
        critical = true
        reason = "🔥 طوارئ قصوى! مستوى عالي جداً"
    }
    else if(maxVal >= 10 && empty <= 3) {
        critical = true
        reason = "⚠️ خطر شديد! مساحة قليلة"
    }
    else if(maxVal >= 8 && empty <= 2) {
        critical = true
        reason = "🚨 وضع حرج!"
    }
    else if(empty <= 1) {
        critical = true
        reason = "💀 لا توجد خلايا!"
    }
    else if(gameState.criticalMode && gameState.movesSinceCritical < 3) {
        critical = true
        reason = "⏱️ استمرار الطوارئ"
        gameState.movesSinceCritical++
    } else {
        gameState.criticalMode = false
        gameState.movesSinceCritical = 0
        reason = "✅ بناء استراتيجي"
    }
    
    if(critical) {
        gameState.criticalMode = true
        gameState.currentStrategy = "emergency"
    } else {
        gameState.currentStrategy = "normal"
    }
    
    return critical
}

function showArrow(move) {
    const arrows = {
        up: "↑",
        down: "↓",
        left: "←",
        right: "→"
    }
    
    document.getElementById("status").innerText = arrows[move] || "⚡"
    
    if(gameState.reachedLevel15) {
        document.getElementById("status").innerText = "👑 " + (arrows[move] || "⚡")
    } else if(gameState.maxLevel >= 12) {
        document.getElementById("status").innerText = "🏆 " + (arrows[move] || "⚡")
    }
}

function deepThink() {
    if(thinking) return
    
    let b = getBoard()
    
    // التحقق من وجود حركة
    if(!hasAnyMove(b)) {
        document.getElementById("status").innerText = "💀 انتهت اللعبة!"
        document.getElementById("status").className = "status danger"
        return
    }
    
    thinking = true
    document.getElementById("status").innerText = "⏳"
    
    setTimeout(() => {
        if(cache.size > 200000) cache.clear()
        
        let b = getBoard()
        let empty = emptyCells(b).length
        let maxVal = getMaxLevel(b)
        
        let criticalMode = analyzeSituation(b)
        
        let depth
        if(criticalMode) {
            depth = 14
        } else if(maxVal >= 12) {
            depth = 13
        } else if(maxVal >= 10) {
            depth = 12
        } else if(maxVal >= 8) {
            depth = 11
        } else if(maxVal >= 6) {
            depth = 10
        } else if(empty > 8) {
            depth = 8
        } else {
            depth = 9
        }
        
        let strategyText = criticalMode ? 
            '<span class="strategy-badge emergency-strategy">🚨 طوارئ</span>' : 
            '<span class="strategy-badge normal-strategy">🔵 عادي</span>'
        
        document.getElementById("infoPanel").innerHTML = 
            `${strategyText} <span class="depth-indicator">عمق ${depth}</span> <span>${criticalMode ? 'وضع طوارئ' : 'وضع طبيعي'}</span>`
        
        let moves = ["up", "down", "left", "right"]
        let bestMove = ""
        let bestScore = -Infinity
        
        let moveScores = []
        for(let m of moves) {
            let sim = JSON.parse(JSON.stringify(b))
            if(!simulate(sim, m)) continue
            
            let quickScore = evaluate(sim, criticalMode)
            moveScores.push({move: m, score: quickScore})
        }
        
        moveScores.sort((a, b) => b.score - a.score)
        let topMoves = moveScores.slice(0, 4)
        
        for(let ms of topMoves) {
            let sim = JSON.parse(JSON.stringify(b))
            simulate(sim, ms.move)
            
            let score = minimax(sim, depth - 1, -Infinity, Infinity, false, criticalMode)
            
            if(score > bestScore) {
                bestScore = score
                bestMove = ms.move
            }
        }
        
        if(bestMove) {
            simulate(b, bestMove)
            setBoard(b)
            updateDisplay(b)
            showArrow(bestMove)
        }
        
        thinking = false
    }, 10)
}

window.onload = function() {
    for(let i = 0; i < 16; i++)
        document.getElementById("t" + i).value = ""
    
    gameState = {
        maxLevel: 0,
        criticalMode: false,
        reachedLevel15: false,
        movesSinceCritical: 0,
        currentStrategy: "normal"
    }
    
    document.getElementById("status").className = "status"
    document.getElementById("status").innerText = "⚡"
    document.getElementById("mainBtn").className = "btn"
    document.getElementById("maxLevel").innerText = "0"
    document.getElementById("totalScore").innerText = "0"
    document.getElementById("infoPanel").innerHTML = "🔄 جاري التحليل..."
    cache.clear()
}

</script>

</body>
</html>
