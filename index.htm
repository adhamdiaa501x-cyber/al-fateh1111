<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QDS - AI System v4.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #050505; --accent: #00f2ff; --panel: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 20px; border: 2px solid var(--accent); box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); width: 85%; max-width: 320px; }
        .brand { font-size: 3rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 15px var(--accent); margin: 0 0 10px; }
        input { width: 90%; padding: 15px; margin-bottom: 20px; background: #000; border: 1px solid #333; color: var(--accent); text-align: center; border-radius: 10px; font-size: 1.2rem; outline: none; }
        button { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #main-content { display: none; padding: 15px; max-width: 400px; margin: auto; }
        .timer-box { background: rgba(255, 204, 0, 0.1); border: 1px solid #ffcc00; color: #ffcc00; padding: 10px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: #222; padding: 12px; border-radius: 15px; margin: 20px 0; border: 1px solid #444; }
        .tile { aspect-ratio: 1; background: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .tile input { width: 100%; height: 100%; background: transparent; border: none; color: var(--accent); text-align: center; font-size: 1.5rem; font-weight: bold; padding: 0; margin: 0; }
        .btn-ai { background: var(--accent); color: #000; width: 100%; padding: 20px; border-radius: 15px; font-weight: 900; font-size: 1.3rem; box-shadow: 0 5px 20px rgba(0, 242, 255, 0.4); border: none; cursor: pointer; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .btn-m { background: #111; color: #fff; border: 1px solid #444; padding: 15px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <div class="brand">QDS</div>
        <p style="color:#666; font-size:0.8rem; margin-bottom:20px;">نظام الوصول المشفر - 48 ساعة</p>
        <input type="text" id="pass-code" placeholder="كود التفعيل">
        <button id="login-btn" onclick="verifyAccess()">تفعيل العضوية 🛡️</button>
        <p id="error-msg" style="color:#ff4444; font-size:0.8rem; margin-top:15px;"></p>
    </div>
</div>

<div id="main-content">
    <div class="brand" style="font-size: 2rem;">QDS AI</div>
    <div id="timer" class="timer-box">جاري حساب الوقت...</div>
    
    <div class="grid" id="mainGrid"></div>
    
    <button class="btn-ai" onclick="deepThink()">تحليل حركة QDS ⚡</button>

    <div class="controls">
        <div></div><button class="btn-m" onclick="manualMove('up')">↑</button><div></div>
        <button class="btn-m" onclick="manualMove('left')">←</button>
        <button class="btn-m" onclick="manualMove('down')">↓</button>
        <button class="btn-m" onclick="manualMove('right')">→</button>
    </div>
    <button onclick="location.reload()" style="background:none; border:none; color:#444; margin-top:20px;">تسجيل الخروج</button>
</div>

<script>
    // إعدادات Firebase
    const config = { databaseURL: "https://al-fateh-store-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(config);
    const db = firebase.database();

    async function verifyAccess() {
        const code = document.getElementById('pass-code').value.trim();
        const error = document.getElementById('error-msg');
        const btn = document.getElementById('login-btn');
        if(!code) return;

        btn.disabled = true; btn.innerText = "فحص السيرفر...";

        try {
            const snap = await db.ref('keys/' + code).once('value');
            const data = snap.val();

            if (data) {
                const now = Date.now();
                if (!data.used) {
                    const expiry = now + (48 * 60 * 60 * 1000);
                    await db.ref('keys/' + code).update({ used: true, expires_at: expiry });
                    launch(expiry);
                } else if (now < data.expires_at) {
                    launch(data.expires_at);
                } else { error.innerText = "انتهت صلاحية هذا الكود!"; }
            } else { error.innerText = "الكود غير موجود في قاعدة البيانات!"; }
        } catch (e) { error.innerText = "خطأ في الاتصال!"; }
        btn.disabled = false; btn.innerText = "تفعيل العضوية 🛡️";
    }

    function launch(expiry) {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        setInterval(() => {
            const left = expiry - Date.now();
            if(left <= 0) location.reload();
            const h = Math.floor(left/(3600000));
            const m = Math.floor((left%3600000)/60000);
            document.getElementById('timer').innerText = `صلاحية الوصول: ${h} ساعة و ${m} دقيقة متبقية`;
        }, 1000);
    }

    // بناء الشبكة والذكاء
    const gridEl = document.getElementById('mainGrid');
    for(let i=0; i<16; i++) gridEl.innerHTML += `<div class="tile"><input type="number" id="t-${i}" placeholder="0"></div>`;

    const W = [[2,4,8,16],[32,64,128,256],[1024,512,256,128],[2048,4096,8192,16384]];
    
    function getM() {
        let m = [];
        for(let i=0; i<4; i++) {
            let r = [];
            for(let j=0; j<4; j++) r.push(parseInt(document.getElementById(`t-${i*4+j}`).value) || 0);
            m.push(r);
        }
        return m;
    }

    function setM(m) {
        for(let i=0; i<4; i++) for(let j=0; j<4; j++) document.getElementById(`t-${i*4+j}`).value = m[i][j] || "";
    }

    function moveLogic(m, dir) {
        const old = JSON.stringify(m);
        const comp = (r) => {
            let n = r.filter(v => v !== 0);
            for(let i=0; i<n.length-1; i++) if(n[i]===n[i+1]) { n[i]*=2; n.splice(i+1,1); }
            while(n.length<4) n.push(0);
            return n;
        };
        if(dir==='left'||dir==='right'){
            for(let i=0; i<4; i++){
                let r = [...m[i]]; if(dir==='right') r.reverse();
                let nr = comp(r); if(dir==='right') nr.reverse();
                m[i] = nr;
            }
        } else {
            for(let j=0; j<4; j++){
                let c = [m[0][j],m[1][j],m[2][j],m[3][j]]; if(dir==='down') c.reverse();
                let nc = comp(c); if(dir==='down') nc.reverse();
                for(let i=0; i<4; i++) m[i][j] = nc[i];
            }
        }
        return old !== JSON.stringify(m);
    }

    function deepThink() {
        const current = getM();
        let bs = -1, bm = '';
        ['up','down','left','right'].forEach(v => {
            let s = JSON.parse(JSON.stringify(current));
            if(moveLogic(s, v)) {
                let sc = 0;
                for(let i=0; i<4; i++) for(let j=0; j<4; j++) sc += s[i][j] * W[i][j];
                if(sc > bs) { bs = sc; bm = v; }
            }
        });
        if(bm) {
            manualMove(bm);
            document.getElementById('status-text').innerText = "تم تطبيق حركة ذكية";
        }
    }

    function manualMove(d) {
        let m = getM(); if(moveLogic(m, d)) setM(m);
    }
</script>
</body>
</html>
