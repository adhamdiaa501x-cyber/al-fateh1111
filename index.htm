<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QDS AI - Zero Error</title>
    <style>
        :root { --bg: #050505; --accent: #00f2ff; --panel: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 420px; margin: auto; }
        .brand-name { font-size: 3.5rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 15px var(--accent); letter-spacing: 5px; margin: 20px 0 5px; }
        .status-box { background: var(--panel); border: 2px solid var(--accent); padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 1.1rem; min-height: 30px; }
        #status-text { color: var(--accent); font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: #222; padding: 12px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .tile { aspect-ratio: 1; background: #000; border-radius: 8px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; }
        .tile input { width: 100%; height: 100%; background: transparent; border: none; color: var(--accent); text-align: center; font-size: 1.6rem; font-weight: bold; outline: none; }
        .btn-ai { background: var(--accent); color: #000; width: 100%; padding: 20px; border-radius: 15px; font-weight: 900; font-size: 1.4rem; border: none; cursor: pointer; box-shadow: 0 5px 25px rgba(0, 242, 255, 0.5); margin-bottom: 25px; }
        .nav-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 280px; margin: auto; }
        .btn-move { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 15px; border-radius: 12px; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="brand-name">QDS</h1>
    <div class="status-box">الوضعية: <span id="status-text">جاهز للتحليل</span></div>
    <div class="grid" id="mainGrid"></div>
    <button class="btn-ai" onclick="deepThink()">⚡ تحليل وحركة QDS</button>
    <div class="nav-controls">
        <div></div><button class="btn-move" onclick="manualMove('up')">↑</button><div></div>
        <button class="btn-move" onclick="manualMove('left')">←</button>
        <button class="btn-move" onclick="manualMove('down')">↓</button>
        <button class="btn-move" onclick="manualMove('right')">→</button>
    </div>
</div>

<script>
    // إنشاء الشبكة
    const gridEl = document.getElementById('mainGrid');
    for(let i=0; i<16; i++) gridEl.innerHTML += `<div class="tile"><input type="number" id="t-${i}" placeholder="0"></div>`;

    // مصفوفة الأوزان لتعزيز الزاوية (أساس ذكاء QDS)
    const W = [[2,4,8,16],[32,64,128,256],[1024,512,256,128],[2048,4096,8192,16384]];

    function getM() {
        let m = [];
        for(let i=0; i<4; i++) {
            let r = [];
            for(let j=0; j<4; j++) r.push(parseInt(document.getElementById(`t-${i*4+j}`).value) || 0);
            m.push(r);
        }
        return m;
    }

    function setM(m) {
        for(let i=0; i<4; i++) for(let j=0; j<4; j++) document.getElementById(`t-${i*4+j}`).value = m[i][j] || "";
    }

    function compress(row) {
        let n = row.filter(v => v !== 0);
        for(let i=0; i<n.length-1; i++) if(n[i] === n[i+1]) { n[i]*=2; n.splice(i+1,1); }
        while(n.length < 4) n.push(0);
        return n;
    }

    // المحرك الأساسي: تم ضبطه ليتجاهل اتجاه اللغة ويركز على حركة المصفوفة
    function simulate(m, dir) {
        const old = JSON.stringify(m);
        if(dir === 'left') { // اليسار يعني ضغط الأرقام لبداية الصف (index 0)
            for(let i=0; i<4; i++) m[i] = compress(m[i]);
        } 
        else if(dir === 'right') { // اليمين يعني عكس الصف، ضغطه، ثم إعادته
            for(let i=0; i<4; i++) {
                m[i].reverse();
                m[i] = compress(m[i]);
                m[i].reverse();
            }
        } 
        else if(dir === 'up') { // لأعلى يعني ضغط الأعمدة لبداية العمود
            for(let j=0; j<4; j++) {
                let col = [m[0][j], m[1][j], m[2][j], m[3][j]];
                let nc = compress(col);
                for(let i=0; i<4; i++) m[i][j] = nc[i];
            }
        } 
        else if(dir === 'down') { // لأسفل يعني عكس العمود، ضغطه، ثم إعادته
            for(let j=0; j<4; j++) {
                let col = [m[0][j], m[1][j], m[2][j], m[3][j]];
                col.reverse();
                let nc = compress(col);
                nc.reverse();
                for(let i=0; i<4; i++) m[i][j] = nc[i];
            }
        }
        return old !== JSON.stringify(m);
    }

    function evaluate(m) {
        let score = 0;
        for(let i=0; i<4; i++) for(let j=0; j<4; j++) score += m[i][j] * W[i][j];
        return score;
    }

    function deepThink() {
        const current = getM();
        let bestScore = -1;
        let bestMove = '';
        const moves = ['up', 'down', 'left', 'right'];

        for(let m1 of moves) {
            let sim1 = JSON.parse(JSON.stringify(current));
            if(simulate(sim1, m1)) {
                let currentMax = -1;
                for(let m2 of moves) {
                    let sim2 = JSON.parse(JSON.stringify(sim1));
                    simulate(sim2, m2);
                    let s = evaluate(sim2);
                    if(s > currentMax) currentMax = s;
                }
                if(currentMax > bestScore) {
                    bestScore = currentMax;
                    bestMove = m1;
                }
            }
        }

        if(bestMove) {
            manualMove(bestMove);
            const labels = {
                'up': 'تحرك للأعلى ↑',
                'down': 'تحرك للأسفل ↓',
                'left': 'تحرك للليسار ←',
                'right': 'تحرك لليمين →'
            };
            document.getElementById('status-text').innerText = labels[bestMove];
        }
    }

    function manualMove(d) {
        let m = getM();
        if(simulate(m, d)) setM(m);
    }
</script>
</body>
</html>
