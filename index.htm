<head>

<style>

:root{

<body>

<div class="container">

<h1 class="brand">QDS</h1>

<div class="credit">
Al FaTeh<br>
01016057623
</div>

<div id="status" class="status">⚡</div>

<div id="grid" class="grid"></div>

<button class="btn" onclick="deepThink()">⚡ تحليل QDS</button>
<button class="btn" onclick="autoPlay()">🤖 Auto Play</button>

</div>

<script>

const grid=document.getElementById("grid")

for(let i=0;i<16;i++)
grid.innerHTML+=`<div class="tile"><input id="t${i}" type="number"></div>`

let cache=new Map()
let auto=false

function getBoard(){

let b=[]

for(let i=0;i<4;i++){

let r=[]

for(let j=0;j<4;j++)
r.push(parseInt(document.getElementById("t"+(i*4+j)).value)||0)

b.push(r)

}

return b

}

function setBoard(b){

for(let i=0;i<4;i++)
for(let j=0;j<4;j++)
document.getElementById("t"+(i*4+j)).value=b[i][j]||""

}

function compress(row){

let n=row.filter(v=>v)

for(let i=0;i<n.length-1;i++){

if(n[i]==n[i+1]){

n[i]+=1
n.splice(i+1,1)

}

}

while(n.length<4)n.push(0)

return n

}

function simulate(b,dir){

let old=JSON.stringify(b)

if(dir=="left")
for(let i=0;i<4;i++)b[i]=compress(b[i])

if(dir=="right")
for(let i=0;i<4;i++){
b[i].reverse()
b[i]=compress(b[i])
b[i].reverse()
}

if(dir=="up")
for(let j=0;j<4;j++){

let c=[b[0][j],b[1][j],b[2][j],b[3][j]]
let nc=compress(c)

for(let i=0;i<4;i++)b[i][j]=nc[i]

}

if(dir=="down")
for(let j=0;j<4;j++){

let c=[b[0][j],b[1][j],b[2][j],b[3][j]]
c.reverse()

let nc=compress(c)
nc.reverse()

for(let i=0;i<4;i++)b[i][j]=nc[i]

}

return old!=JSON.stringify(b)

}

function emptyCells(b){

let e=[]

for(let i=0;i<4;i++)
for(let j=0;j<4;j++)
if(b[i][j]==0)e.push([i,j])

return e

}

function smoothness(b){

let s=0

for(let i=0;i<4;i++)
for(let j=0;j<3;j++)
s-=Math.abs(b[i][j]-b[i][j+1])

return s

}

function monotonic(b){

let score=0

for(let i=0;i<4;i++)
for(let j=0;j<3;j++)
if(b[i][j]>=b[i][j+1])score++

return score

}

function maxTile(b){

let m=0

for(let r of b)
for(let v of r)
if(v>m)m=v

return m

}

function evaluate(b){

let empty=emptyCells(b).length

return smoothness(b)*2 +
monotonic(b)*5 +
empty*1200 +
maxTile(b)*50

}

function expectimax(b,depth,player){

let key=JSON.stringify(b)+depth+player

if(cache.has(key))return cache.get(key)

if(depth==0)return evaluate(b)

let result

if(player){

let best=-Infinity

let moves=["up","down","left","right"]

for(let m of moves){

let sim=JSON.parse(JSON.stringify(b))

if(!simulate(sim,m))continue

best=Math.max(best,expectimax(sim,depth-1,false))

}

result=best

}

else{

let cells=emptyCells(b)

if(cells.length==0)return evaluate(b)

let total=0

for(let c of cells){

let sim=JSON.parse(JSON.stringify(b))

sim[c[0]][c[1]]=1

total+=expectimax(sim,depth-1,true)

}

result=total/cells.length

}

cache.set(key,result)

return result

}

function showArrow(move){

const arrows={
up:"↑",
down:"↓",
left:"←",
right:"→"
}

document.getElementById("status").innerText=arrows[move]

}

function deepThink(){

let b=getBoard()

let empty=emptyCells(b).length

let depth=empty>8?24:16

let moves=["up","down","left","right"]

let bestMove=""
let bestScore=-Infinity

for(let m of moves){

let sim=JSON.parse(JSON.stringify(b))

if(!simulate(sim,m))continue

let score=expectimax(sim,depth,false)

if(score>bestScore){

bestScore=score
bestMove=m

}

}

if(bestMove){

simulate(b,bestMove)
setBoard(b)
showArrow(bestMove)

}

}

function autoPlay(){

auto=!auto

if(auto)loop()

}

function loop(){

if(!auto)return

deepThink()

setTimeout(loop,80)

}

</script>

</body>
</html>
