<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QDS AI - النسخة الذكية</title>

<style>

:root{
--bg:#050505;
--accent:#00f2ff;
--panel:#111;
}

body{
background:var(--bg);
color:#fff;
font-family:Segoe UI;
margin:0;
padding:15px;
text-align:center;
}

.container{
max-width:420px;
margin:auto;
}

.brand{
font-size:3rem;
font-weight:900;
color:var(--accent);
text-shadow:0 0 20px var(--accent);
}

.credit{
margin-top:5px;
font-size:1rem;
color:#aaa;
}

.status{
background:var(--panel);
border:2px solid var(--accent);
border-radius:12px;
padding:15px;
margin:15px 0;
font-size:2rem;
color:var(--accent);
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
background:#222;
padding:12px;
border-radius:15px;
}

.tile{
aspect-ratio:1;
background:#000;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
}

.tile input{
width:100%;
height:100%;
border:none;
background:transparent;
color:var(--accent);
font-size:1.6rem;
text-align:center;
outline:none;
}

.btn{
background:var(--accent);
border:none;
padding:18px;
border-radius:12px;
font-size:1.2rem;
font-weight:900;
cursor:pointer;
width:100%;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<h1 class="brand">QDS</h1>

<div class="credit">
Al FaTeh<br>
01016057623
</div>

<div id="status" class="status">⚡</div>

<div id="grid" class="grid"></div>

<button class="btn" onclick="deepThink()">⚡ تحليل QDS</button>

</div>

<script>

const grid=document.getElementById("grid")

for(let i=0;i<16;i++)
grid.innerHTML+=`<div class="tile"><input id="t${i}" type="number"></div>`

let cache=new Map()
let movesCache=new Map() // كاش إضافي للحركات

function getBoard(){

let b=[]

for(let i=0;i<4;i++){

let r=[]

for(let j=0;j<4;j++)
r.push(parseInt(document.getElementById("t"+(i*4+j)).value)||0)

b.push(r)

}

return b

}

function setBoard(b){

for(let i=0;i<4;i++)
for(let j=0;j<4;j++)
document.getElementById("t"+(i*4+j)).value=b[i][j]||""

}

function compress(row){

let n=row.filter(v=>v)

for(let i=0;i<n.length-1;i++){

if(n[i]==n[i+1]){

n[i]+=1
n.splice(i+1,1)

}

}

while(n.length<4)n.push(0)

return n

}

function simulate(b, dir) {
    let old = JSON.stringify(b)
    
    // تصحيح الاتجاهات حسب المطلوب
    if(dir == "left") { // حركة لليسار
        for(let i=0; i<4; i++) {
            b[i] = compress(b[i])
        }
    }
    else if(dir == "right") { // حركة لليمين
        for(let i=0; i<4; i++) {
            b[i].reverse()
            b[i] = compress(b[i])
            b[i].reverse()
        }
    }
    else if(dir == "up") {
        for(let j=0; j<4; j++) {
            let c = [b[0][j], b[1][j], b[2][j], b[3][j]]
            let nc = compress(c)
            for(let i=0; i<4; i++) b[i][j] = nc[i]
        }
    }
    else if(dir == "down") {
        for(let j=0; j<4; j++) {
            let c = [b[0][j], b[1][j], b[2][j], b[3][j]]
            c.reverse()
            let nc = compress(c)
            nc.reverse()
            for(let i=0; i<4; i++) b[i][j] = nc[i]
        }
    }
    
    return old != JSON.stringify(b)
}

function emptyCells(b){

let e=[]

for(let i=0;i<4;i++)
for(let j=0;j<4;j++)
if(b[i][j]==0)e.push([i,j])

return e

}

// تقييم متطور جداً
function evaluate(b){

let score=0
let empty=emptyCells(b).length

// 1. الأولوية القصوى للخلايا الفارغة
score+=empty*10000

// 2. مكافأة للقيمة الأكبر في الزاوية
let maxVal=0
let maxPos={i:0,j:0}
for(let i=0;i<4;i++){
for(let j=0;j<4;j++){
if(b[i][j]>maxVal){
maxVal=b[i][j]
maxPos={i,j}
}
}
}

// الزاوية اليسرى العليا هي الأفضل
if(maxPos.i==0 && maxPos.j==0) score+=maxVal*1000
else if(maxPos.i==0 && maxPos.j==3) score+=maxVal*700
else if(maxPos.i==3 && maxPos.j==0) score+=maxVal*700
else if(maxPos.i==3 && maxPos.j==3) score+=maxVal*500
else score-=maxVal*200 // عقاب لو في النص

// 3. مكافأة للتجانس (الأرقام المتساوية جنب بعضها)
for(let i=0;i<4;i++){
for(let j=0;j<3;j++){
if(b[i][j]==b[i][j+1] && b[i][j]>0){
score+=b[i][j]*400
}
}
}
for(let j=0;j<4;j++){
for(let i=0;i<3;i++){
if(b[i][j]==b[i+1][j] && b[i][j]>0){
score+=b[i][j]*400
}
}
}

// 4. مكافأة للترتيب التصاعدي (زيادة في اتجاه الزاوية)
// الصفوف
for(let i=0;i<4;i++){
for(let j=0;j<3;j++){
if(b[i][j]>=b[i][j+1]) score+=b[i][j]*50
}
}
// الأعمدة
for(let j=0;j<4;j++){
for(let i=0;i<3;i++){
if(b[i][j]>=b[i+1][j]) score+=b[i][j]*50
}
}

// 5. عقاب للقيم الكبيرة في المنتصف
for(let i=1;i<3;i++){
for(let j=1;j<3;j++){
score-=b[i][j]*100
}
}

// 6. مكافأة للقيم الكبيرة عموماً
score+=maxVal*500

return score

}

// خوارزمية Minimax متطورة مع تقليم ألفا-بيتا
function minimax(b, depth, alpha, beta, isMax){

if(depth==0)return evaluate(b)

let key=JSON.stringify(b)+depth+isMax
if(cache.has(key))return cache.get(key)

if(isMax){
// دور اللاعب
let moves=["up","down","left","right"]
let best=-Infinity

for(let m of moves){
let sim=JSON.parse(JSON.stringify(b))
if(!simulate(sim,m))continue

let val=minimax(sim,depth-1,alpha,beta,false)

if(val>best){
best=val
}
alpha=Math.max(alpha,val)
if(beta<=alpha)break // تقليم ألفا-بيتا
}

cache.set(key,best)
return best

}else{
// دور الخصم (تقدير أسوأ سيناريو للأرقام الجديدة)
let empty=emptyCells(b)
if(empty.length==0)return evaluate(b)

let best=Infinity

// بناخد أسوأ حالة (أقل تقييم) عشان نكون متأكدين
for(let [i,j] of empty){
for(let val of [1,2]){ // 1 = 2, 2 = 4
let sim=JSON.parse(JSON.stringify(b))
sim[i][j]=val
let val2=minimax(sim,depth-1,alpha,beta,true)
best=Math.min(best,val2)
beta=Math.min(beta,val2)
if(beta<=alpha)break
}
}

cache.set(key,best)
return best
}

}

function showArrow(move){

const arrows={
up:"↑",
down:"↓",
left:"←",
right:"→"
}

document.getElementById("status").innerText=arrows[move]

}

function getBestMove(b, depth) {
    let moves = ["up", "down", "left", "right"]
    let bestMove = ""
    let bestScore = -Infinity
    let moveScores = []
    
    // تقييم سريع لكل حركة
    for(let m of moves) {
        let sim = JSON.parse(JSON.stringify(b))
        if(!simulate(sim, m)) continue
        
        // تقييم سريع
        let quickScore = evaluate(sim)
        moveScores.push({move: m, score: quickScore})
    }
    
    // ترتيب الحركات حسب التقييم السريع
    moveScores.sort((a,b) => b.score - a.score)
    
    // نأخذ أفضل 3 حركات فقط للتحليل العميق
    let topMoves = moveScores.slice(0, 3)
    
    // تحليل عميق للحركات الواعدة
    for(let ms of topMoves) {
        let sim = JSON.parse(JSON.stringify(b))
        simulate(sim, ms.move)
        
        // استخدام Minimax مع عمق أكبر
        let score = minimax(sim, depth, -Infinity, Infinity, false)
        
        if(score > bestScore) {
            bestScore = score
            bestMove = ms.move
        }
    }
    
    return bestMove
}

function deepThink(){

if(cache.size>100000) cache.clear()

let b=getBoard()
let empty=emptyCells(b).length
let maxVal=0
for(let i=0;i<4;i++) for(let j=0;j<4;j++) if(b[i][j]>maxVal) maxVal=b[i][j]

// عمق تفكير ديناميكي حسب الموقف
let depth
if(maxVal>=10) depth=10      // مستويات عالية - تفكير عميق جداً
else if(maxVal>=8) depth=9
else if(maxVal>=6) depth=8
else if(empty>8) depth=6     // بداية اللعبة - أسرع
else if(empty>5) depth=7
else depth=8                 // منتصف اللعبة

let bestMove = getBestMove(b, depth)

if(bestMove){
simulate(b, bestMove)
setBoard(b)
showArrow(bestMove)
}else{
document.getElementById("status").innerText="❌"
}

}

window.onload=function(){
// مجرد تجهيز الموقع - بدون إضافة أرقام
document.getElementById("status").innerText="⚡"
cache.clear()
}

</script>

</body>
</html>
